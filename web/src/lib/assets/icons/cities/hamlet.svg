<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-hamlet" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Core Glow -->
    <circle cx="32" cy="32" r="8" fill="#fcd34d" filter="url(#neon-glow-hamlet)" opacity="0.6"/>
    <!-- Central Node -->
    <circle cx="32" cy="32" r="4" fill="#fffbeb" filter="url(#neon-glow-hamlet)"/>
    
    <!-- Minor Roads/Connections -->
    <line x1="32" y1="20" x2="32" y2="10" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-hamlet)"/>
    <line x1="44" y1="32" x2="54" y2="32" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-hamlet)"/>
    <line x1="32" y1="44" x2="32" y2="54" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-hamlet)"/>
    <line x1="20" y1="32" x2="10" y2="32" stroke="#fcd34d" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-hamlet)"/>
</svg>
