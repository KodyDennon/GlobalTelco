<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-metro" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <radialGradient id="metro-grad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#c084fc" stop-opacity="0.9"/>
            <stop offset="100%" stop-color="#6b21a8" stop-opacity="0.4"/>
        </radialGradient>
    </defs>
    
    <!-- Sprawling Suburbs -->
    <polygon points="32,2 62,32 32,62 2,32" fill="none" stroke="#d8b4fe" stroke-width="2" stroke-dasharray="8 4" filter="url(#neon-glow-metro)" opacity="0.6"/>

    <!-- Dense Urban Core -->
    <circle cx="32" cy="32" r="24" fill="url(#metro-grad)" filter="url(#neon-glow-metro)"/>
    
    <!-- Multi-Node Network -->
    <circle cx="32" cy="18" r="5" fill="#faf5ff" filter="url(#neon-glow-metro)"/>
    <circle cx="32" cy="46" r="5" fill="#faf5ff" filter="url(#neon-glow-metro)"/>
    <circle cx="18" cy="32" r="5" fill="#faf5ff" filter="url(#neon-glow-metro)"/>
    <circle cx="46" cy="32" r="5" fill="#faf5ff" filter="url(#neon-glow-metro)"/>
    
    <!-- Main Transit Lines -->
    <path d="M 18 32 Q 32 18 46 32 Q 32 46 18 32" fill="none" stroke="#e9d5ff" stroke-width="2.5" filter="url(#neon-glow-metro)"/>
    
    <!-- Central Monolith -->
    <circle cx="32" cy="32" r="10" fill="#f3e8ff" filter="url(#neon-glow-metro)"/>
    <circle cx="32" cy="32" r="14" fill="none" stroke="#d8b4fe" stroke-width="2" filter="url(#neon-glow-metro)"/>
</svg>
