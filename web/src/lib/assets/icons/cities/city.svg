<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-city" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <radialGradient id="city-grad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#ef4444" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#991b1b" stop-opacity="0.3"/>
        </radialGradient>
    </defs>
    
    <!-- Outer Expansion Ring -->
    <path d="M 32 4 A 28 28 0 1 1 31.9 4" fill="none" stroke="#fca5a5" stroke-width="1.5" stroke-dasharray="4 6" filter="url(#neon-glow-city)" opacity="0.5"/>

    <!-- Core City Area -->
    <circle cx="32" cy="32" r="22" fill="url(#city-grad)" filter="url(#neon-glow-city)"/>
    
    <!-- Sub-centers -->
    <circle cx="24" cy="24" r="4" fill="#fee2e2" filter="url(#neon-glow-city)"/>
    <circle cx="40" cy="24" r="4" fill="#fee2e2" filter="url(#neon-glow-city)"/>
    <circle cx="32" cy="40" r="4" fill="#fee2e2" filter="url(#neon-glow-city)"/>

    <!-- Connecting Infrastructure -->
    <line x1="24" y1="24" x2="40" y2="24" stroke="#f87171" stroke-width="2" filter="url(#neon-glow-city)"/>
    <line x1="24" y1="24" x2="32" y2="40" stroke="#f87171" stroke-width="2" filter="url(#neon-glow-city)"/>
    <line x1="40" y1="24" x2="32" y2="40" stroke="#f87171" stroke-width="2" filter="url(#neon-glow-city)"/>
    
    <!-- Downtown Core -->
    <circle cx="32" cy="30" r="8" fill="#fef2f2" filter="url(#neon-glow-city)"/>
</svg>
