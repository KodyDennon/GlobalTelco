<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-town" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <radialGradient id="town-grad" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#fb923c" stop-opacity="0.8"/>
            <stop offset="100%" stop-color="#ea580c" stop-opacity="0.2"/>
        </radialGradient>
    </defs>
    <!-- Core Glow area -->
    <circle cx="32" cy="32" r="14" fill="url(#town-grad)" filter="url(#neon-glow-town)"/>
    
    <!-- Central Hub -->
    <circle cx="32" cy="32" r="6" fill="#ffedd5" filter="url(#neon-glow-town)"/>
    
    <!-- Ring road -->
    <circle cx="32" cy="32" r="20" fill="none" stroke="#fdba74" stroke-width="1.5" filter="url(#neon-glow-town)" opacity="0.6"/>
    
    <!-- Major Arteries -->
    <line x1="32" y1="12" x2="32" y2="2" stroke="#fdba74" stroke-width="2" filter="url(#neon-glow-town)"/>
    <line x1="52" y1="32" x2="62" y2="32" stroke="#fdba74" stroke-width="2" filter="url(#neon-glow-town)"/>
    <line x1="32" y1="52" x2="32" y2="62" stroke="#fdba74" stroke-width="2" filter="url(#neon-glow-town)"/>
    <line x1="12" y1="32" x2="2" y2="32" stroke="#fdba74" stroke-width="2" filter="url(#neon-glow-town)"/>
</svg>
