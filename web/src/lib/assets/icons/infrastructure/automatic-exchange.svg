<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-ae" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="ae-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#c2410c" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#7c2d12" stop-opacity="0.1"/>
        </linearGradient>
    </defs>
    <!-- Equipment Rack -->
    <rect x="14" y="12" width="36" height="46" rx="3" fill="url(#ae-grad)" stroke="#ea580c" stroke-width="2" filter="url(#neon-glow-ae)"/>
    <!-- Rotary Dial Mechanism (Strowger switch) -->
    <circle cx="32" cy="30" r="12" fill="none" stroke="#fb923c" stroke-width="2" filter="url(#neon-glow-ae)"/>
    <circle cx="32" cy="30" r="8" fill="none" stroke="#f97316" stroke-width="1.5" filter="url(#neon-glow-ae)"/>
    <circle cx="32" cy="30" r="3" fill="#fdba74" filter="url(#neon-glow-ae)"/>
    <!-- Selector contacts around dial -->
    <circle cx="32" cy="19" r="1.5" fill="#fde68a" filter="url(#neon-glow-ae)"/>
    <circle cx="40" cy="23" r="1.5" fill="#fde68a" filter="url(#neon-glow-ae)"/>
    <circle cx="43" cy="30" r="1.5" fill="#fde68a" filter="url(#neon-glow-ae)"/>
    <circle cx="40" cy="37" r="1.5" fill="#fde68a" filter="url(#neon-glow-ae)"/>
    <circle cx="32" cy="41" r="1.5" fill="#fde68a" filter="url(#neon-glow-ae)"/>
    <circle cx="24" cy="37" r="1.5" fill="#fde68a" filter="url(#neon-glow-ae)"/>
    <circle cx="21" cy="30" r="1.5" fill="#fde68a" filter="url(#neon-glow-ae)"/>
    <circle cx="24" cy="23" r="1.5" fill="#fde68a" filter="url(#neon-glow-ae)"/>
    <!-- Wiper arm -->
    <line x1="32" y1="30" x2="32" y2="19" stroke="#fde68a" stroke-width="2" filter="url(#neon-glow-ae)"/>
    <!-- Status indicators -->
    <circle cx="20" cy="50" r="2" fill="#34d399" filter="url(#neon-glow-ae)"/>
    <circle cx="28" cy="50" r="2" fill="#34d399" filter="url(#neon-glow-ae)"/>
    <circle cx="36" cy="50" r="2" fill="#f59e0b" filter="url(#neon-glow-ae)"/>
    <circle cx="44" cy="50" r="2" fill="#34d399" filter="url(#neon-glow-ae)"/>
    <!-- Top ventilation slots -->
    <line x1="20" y1="15" x2="26" y2="15" stroke="#fb923c" stroke-width="1" filter="url(#neon-glow-ae)"/>
    <line x1="30" y1="15" x2="34" y2="15" stroke="#fb923c" stroke-width="1" filter="url(#neon-glow-ae)"/>
    <line x1="38" y1="15" x2="44" y2="15" stroke="#fb923c" stroke-width="1" filter="url(#neon-glow-ae)"/>
</svg>