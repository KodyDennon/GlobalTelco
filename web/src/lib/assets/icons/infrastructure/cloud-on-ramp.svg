<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-cor" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Cloud Shape -->
    <path d="M 16 28 Q 16 16 28 16 Q 34 8 44 14 Q 54 14 54 26 Q 58 28 56 34 Q 56 40 48 40 L 16 40 Q 8 40 8 32 Q 8 26 16 28 Z" fill="none" stroke="#8b5cf6" stroke-width="2" filter="url(#neon-glow-cor)"/>
    <!-- Cloud inner gradient feel -->
    <path d="M 20 30 Q 28 24 36 28 Q 42 22 50 30" fill="none" stroke="#a78bfa" stroke-width="1" stroke-dasharray="2 2" filter="url(#neon-glow-cor)" opacity="0.5"/>
    <!-- On-ramp arrow going up into cloud -->
    <line x1="32" y1="58" x2="32" y2="42" stroke="#c4b5fd" stroke-width="3" filter="url(#neon-glow-cor)"/>
    <path d="M 24 48 L 32 40 L 40 48" fill="none" stroke="#c4b5fd" stroke-width="2.5" filter="url(#neon-glow-cor)"/>
    <!-- Interconnect ports at base -->
    <circle cx="20" cy="56" r="3" fill="none" stroke="#7c3aed" stroke-width="1.5" filter="url(#neon-glow-cor)"/>
    <circle cx="20" cy="56" r="1" fill="#a78bfa" filter="url(#neon-glow-cor)"/>
    <circle cx="44" cy="56" r="3" fill="none" stroke="#7c3aed" stroke-width="1.5" filter="url(#neon-glow-cor)"/>
    <circle cx="44" cy="56" r="1" fill="#a78bfa" filter="url(#neon-glow-cor)"/>
    <!-- Fiber connections from ports to ramp -->
    <line x1="23" y1="56" x2="30" y2="52" stroke="#a78bfa" stroke-width="1" filter="url(#neon-glow-cor)"/>
    <line x1="41" y1="56" x2="34" y2="52" stroke="#a78bfa" stroke-width="1" filter="url(#neon-glow-cor)"/>
    <!-- Data sparkles in cloud -->
    <circle cx="24" cy="26" r="1.5" fill="#ddd6fe" filter="url(#neon-glow-cor)"/>
    <circle cx="36" cy="22" r="1.5" fill="#ddd6fe" filter="url(#neon-glow-cor)"/>
    <circle cx="46" cy="28" r="1.5" fill="#ddd6fe" filter="url(#neon-glow-cor)"/>
</svg>