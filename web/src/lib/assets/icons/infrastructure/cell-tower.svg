<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="currentColor">
  <!-- Lattice tower structure -->
  <polygon points="26,60 22,60 28,16 32,16" opacity="0.85"/>
  <polygon points="38,60 42,60 36,16 32,16" opacity="0.85"/>
  <!-- Cross braces -->
  <line x1="26" y1="52" x2="38" y2="48" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
  <line x1="38" y1="52" x2="26" y2="48" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
  <line x1="27" y1="44" x2="37" y2="40" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
  <line x1="37" y1="44" x2="27" y2="40" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
  <line x1="28.5" y1="36" x2="35.5" y2="32" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
  <line x1="35.5" y1="36" x2="28.5" y2="32" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
  <line x1="29.5" y1="28" x2="34.5" y2="24" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
  <line x1="34.5" y1="28" x2="29.5" y2="24" stroke="currentColor" stroke-width="1.5" opacity="0.5"/>
  <!-- Platform -->
  <rect x="24" y="14" width="16" height="3" rx="0.5"/>
  <!-- Antenna panels (sector antennas) -->
  <rect x="22" y="6" width="3" height="9" rx="1" transform="rotate(-15 23.5 10.5)"/>
  <rect x="30.5" y="4" width="3" height="10" rx="1"/>
  <rect x="39" y="6" width="3" height="9" rx="1" transform="rotate(15 40.5 10.5)"/>
  <!-- Top mast -->
  <rect x="31" y="1" width="2" height="4" rx="0.5"/>
  <circle cx="32" cy="1" r="1.5"/>
  <!-- Signal waves - left -->
  <path d="M16 8a18 18 0 0 1 5-6" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
  <path d="M13 10a22 22 0 0 1 6-8" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.25"/>
  <!-- Signal waves - right -->
  <path d="M43 2a18 18 0 0 1 5 6" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.4"/>
  <path d="M45 -2a22 22 0 0 1 6 8" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.25" transform="translate(0,4)"/>
  <!-- Base/foundation -->
  <rect x="18" y="60" width="28" height="3" rx="1" opacity="0.6"/>
</svg>
