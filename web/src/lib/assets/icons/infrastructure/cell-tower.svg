<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-tower" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Base -->
    <path d="M 28 60 L 36 60 L 38 40 L 26 40 Z" fill="none" stroke="#22d3ee" stroke-width="2" filter="url(#neon-glow-tower)"/>
    <!-- Middle Tier -->
    <path d="M 26 40 L 38 40 L 36 20 L 28 20 Z" fill="none" stroke="#22d3ee" stroke-width="2" filter="url(#neon-glow-tower)"/>
    <!-- Cross Bracing -->
    <path d="M 26 40 L 36 20 M 38 40 L 28 20 M 28 60 L 38 40 M 36 60 L 26 40" fill="none" stroke="#0891b2" stroke-width="1" filter="url(#neon-glow-tower)" opacity="0.6"/>
    <!-- Top Spire -->
    <line x1="32" y1="20" x2="32" y2="6" stroke="#22d3ee" stroke-width="2" filter="url(#neon-glow-tower)"/>
    <!-- Signal Pulses -->
    <circle cx="32" cy="6" r="4" fill="#67e8f9" filter="url(#neon-glow-tower)"/>
    <path d="M 22 12 Q 32 2 42 12" fill="none" stroke="#67e8f9" stroke-width="1.5" filter="url(#neon-glow-tower)" opacity="0.8"/>
    <path d="M 16 18 Q 32 -4 48 18" fill="none" stroke="#67e8f9" stroke-width="1.5" filter="url(#neon-glow-tower)" opacity="0.5"/>
</svg>
