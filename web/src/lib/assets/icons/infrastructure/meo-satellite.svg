<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-meos" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Larger Satellite Body (MEO = bigger, more capable) -->
    <rect x="22" y="24" width="20" height="16" rx="3" fill="none" stroke="#60a5fa" stroke-width="2" filter="url(#neon-glow-meos)"/>
    <!-- Solar Panels (larger, deployed arrays) -->
    <rect x="2" y="26" width="18" height="12" rx="1" fill="none" stroke="#fbbf24" stroke-width="1.5" filter="url(#neon-glow-meos)"/>
    <rect x="44" y="26" width="18" height="12" rx="1" fill="none" stroke="#fbbf24" stroke-width="1.5" filter="url(#neon-glow-meos)"/>
    <!-- Solar cell grid -->
    <line x1="8" y1="26" x2="8" y2="38" stroke="#f59e0b" stroke-width="0.5" filter="url(#neon-glow-meos)" opacity="0.5"/>
    <line x1="14" y1="26" x2="14" y2="38" stroke="#f59e0b" stroke-width="0.5" filter="url(#neon-glow-meos)" opacity="0.5"/>
    <line x1="50" y1="26" x2="50" y2="38" stroke="#f59e0b" stroke-width="0.5" filter="url(#neon-glow-meos)" opacity="0.5"/>
    <line x1="56" y1="26" x2="56" y2="38" stroke="#f59e0b" stroke-width="0.5" filter="url(#neon-glow-meos)" opacity="0.5"/>
    <!-- Navigation payload antenna (dish on top) -->
    <path d="M 26 24 Q 32 16 38 24" fill="none" stroke="#93c5fd" stroke-width="2" filter="url(#neon-glow-meos)"/>
    <line x1="32" y1="24" x2="32" y2="18" stroke="#60a5fa" stroke-width="1.5" filter="url(#neon-glow-meos)"/>
    <circle cx="32" cy="16" r="2.5" fill="#bfdbfe" filter="url(#neon-glow-meos)"/>
    <!-- L-band broadcast beam -->
    <path d="M 28 40 L 22 54" fill="none" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-meos)" opacity="0.5"/>
    <path d="M 36 40 L 42 54" fill="none" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-meos)" opacity="0.5"/>
    <!-- Wide beam footprint -->
    <path d="M 16 58 Q 32 50 48 58" fill="none" stroke="#60a5fa" stroke-width="1" filter="url(#neon-glow-meos)" opacity="0.3"/>
    <!-- Atomic clock indicator (precision) -->
    <rect x="26" y="28" width="12" height="4" rx="1" fill="none" stroke="#93c5fd" stroke-width="1" filter="url(#neon-glow-meos)"/>
    <circle cx="28" cy="30" r="1" fill="#34d399" filter="url(#neon-glow-meos)"/>
    <circle cx="32" cy="30" r="1" fill="#34d399" filter="url(#neon-glow-meos)"/>
    <circle cx="36" cy="30" r="1" fill="#34d399" filter="url(#neon-glow-meos)"/>
</svg>