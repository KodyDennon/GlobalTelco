<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="currentColor">
  <!-- Pole -->
  <rect x="30" y="20" width="4" height="38" rx="0.5"/>
  <!-- Top equipment housing -->
  <rect x="24" y="14" width="16" height="8" rx="2"/>
  <!-- Antenna panels - left -->
  <rect x="14" y="10" width="4" height="14" rx="1.5" transform="rotate(-10 16 17)"/>
  <!-- Antenna panels - right -->
  <rect x="46" y="10" width="4" height="14" rx="1.5" transform="rotate(10 48 17)"/>
  <!-- Top omnidirectional antenna -->
  <rect x="31" y="4" width="2" height="10" rx="0.5"/>
  <circle cx="32" cy="4" r="2"/>
  <circle cx="32" cy="4" r="1" opacity="0.4" fill="#fff"/>
  <!-- Signal waves left -->
  <path d="M10 12a12 12 0 0 1 3-6" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.35"/>
  <path d="M7 14a16 16 0 0 1 4-8" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
  <path d="M4 16a20 20 0 0 1 5-10" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.12"/>
  <!-- Signal waves right -->
  <path d="M51 6a12 12 0 0 1 3 6" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.35"/>
  <path d="M53 4a16 16 0 0 1 4 8" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
  <path d="M55 2a20 20 0 0 1 5 10" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.12"/>
  <!-- Equipment box on pole -->
  <rect x="26" y="34" width="12" height="8" rx="1" opacity="0.7"/>
  <circle cx="30" cy="38" r="1" opacity="0.4" fill="#fff"/>
  <circle cx="34" cy="38" r="1" opacity="0.4" fill="#fff"/>
  <!-- Cable runs -->
  <path d="M28 22c-4 2-6 6-6 12" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4"/>
  <path d="M36 22c4 2 6 6 6 12" fill="none" stroke="currentColor" stroke-width="1" opacity="0.4"/>
  <!-- Base mount -->
  <rect x="24" y="56" width="16" height="4" rx="1.5"/>
  <!-- Ground plate -->
  <rect x="18" y="60" width="28" height="3" rx="1.5" opacity="0.4"/>
</svg>
