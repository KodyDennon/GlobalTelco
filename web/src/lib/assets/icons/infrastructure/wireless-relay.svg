<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-relay" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Relay Base -->
    <path d="M 24 50 L 40 50 L 36 32 L 28 32 Z" fill="none" stroke="#2dd4bf" stroke-width="2" filter="url(#neon-glow-relay)"/>
    <line x1="16" y1="50" x2="48" y2="50" stroke="#2dd4bf" stroke-width="2" filter="url(#neon-glow-relay)"/>

    <!-- Dual Antennas -->
    <line x1="28" y1="32" x2="20" y2="12" stroke="#5eead4" stroke-width="2" filter="url(#neon-glow-relay)"/>
    <line x1="36" y1="32" x2="44" y2="12" stroke="#5eead4" stroke-width="2" filter="url(#neon-glow-relay)"/>

    <circle cx="20" cy="10" r="3" fill="#ccfbf1" filter="url(#neon-glow-relay)"/>
    <circle cx="44" cy="10" r="3" fill="#ccfbf1" filter="url(#neon-glow-relay)"/>

    <!-- Crosslink -->
    <line x1="24" y1="22" x2="40" y2="22" stroke="#ccfbf1" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-relay)"/>
    
    <!-- Signal Arcs -->
    <path d="M 10 10 Q 32 -6 54 10" fill="none" stroke="#99f6e4" stroke-width="2" stroke-dasharray="4 4" filter="url(#neon-glow-relay)"/>
    
    <!-- Central Processing Unit -->
    <rect x="28" y="38" width="8" height="8" rx="1" fill="#14b8a6" filter="url(#neon-glow-relay)"/>
</svg>
