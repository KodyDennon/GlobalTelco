<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-ep" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Central Hub -->
    <circle cx="32" cy="32" r="14" fill="none" stroke="#f472b6" stroke-width="2" filter="url(#neon-glow-ep)"/>
    <circle cx="32" cy="32" r="6" fill="#fb7185" filter="url(#neon-glow-ep)"/>
    
    <!-- Connecting Nodes -->
    <line x1="32" y1="18" x2="32" y2="6" stroke="#f472b6" stroke-width="2" filter="url(#neon-glow-ep)"/>
    <circle cx="32" cy="8" r="3" fill="#fda4af" filter="url(#neon-glow-ep)"/>

    <line x1="32" y1="46" x2="32" y2="58" stroke="#f472b6" stroke-width="2" filter="url(#neon-glow-ep)"/>
    <circle cx="32" cy="56" r="3" fill="#fda4af" filter="url(#neon-glow-ep)"/>

    <line x1="18" y1="32" x2="6" y2="32" stroke="#f472b6" stroke-width="2" filter="url(#neon-glow-ep)"/>
    <circle cx="8" cy="32" r="3" fill="#fda4af" filter="url(#neon-glow-ep)"/>

    <line x1="46" y1="32" x2="58" y2="32" stroke="#f472b6" stroke-width="2" filter="url(#neon-glow-ep)"/>
    <circle cx="56" cy="32" r="3" fill="#fda4af" filter="url(#neon-glow-ep)"/>

    <!-- Diagonal Data Streams -->
    <line x1="22" y1="22" x2="14" y2="14" stroke="#f472b6" stroke-dasharray="2 3" stroke-width="1.5" filter="url(#neon-glow-ep)"/>
    <line x1="42" y1="42" x2="50" y2="50" stroke="#f472b6" stroke-dasharray="2 3" stroke-width="1.5" filter="url(#neon-glow-ep)"/>
    <line x1="42" y1="22" x2="50" y2="14" stroke="#f472b6" stroke-dasharray="2 3" stroke-width="1.5" filter="url(#neon-glow-ep)"/>
    <line x1="22" y1="42" x2="14" y2="50" stroke="#f472b6" stroke-dasharray="2 3" stroke-width="1.5" filter="url(#neon-glow-ep)"/>
</svg>
