<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="currentColor">
  <!-- Outer ring - network hub -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="currentColor" stroke-width="2" opacity="0.3"/>
  <circle cx="32" cy="32" r="22" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.2"/>
  <!-- Central hub -->
  <circle cx="32" cy="32" r="10"/>
  <!-- Hub detail - port indicators -->
  <circle cx="32" cy="32" r="6" opacity="0.3" fill="#fff"/>
  <circle cx="32" cy="32" r="2.5"/>
  <!-- Satellite nodes -->
  <circle cx="32" cy="6" r="4"/>
  <circle cx="54" cy="19" r="4"/>
  <circle cx="54" cy="45" r="4"/>
  <circle cx="32" cy="58" r="4"/>
  <circle cx="10" cy="45" r="4"/>
  <circle cx="10" cy="19" r="4"/>
  <!-- Connection lines -->
  <line x1="32" y1="10" x2="32" y2="22" stroke="currentColor" stroke-width="2.5"/>
  <line x1="50.5" y1="21" x2="40" y2="26" stroke="currentColor" stroke-width="2.5"/>
  <line x1="50.5" y1="43" x2="40" y2="38" stroke="currentColor" stroke-width="2.5"/>
  <line x1="32" y1="54" x2="32" y2="42" stroke="currentColor" stroke-width="2.5"/>
  <line x1="13.5" y1="43" x2="24" y2="38" stroke="currentColor" stroke-width="2.5"/>
  <line x1="13.5" y1="21" x2="24" y2="26" stroke="currentColor" stroke-width="2.5"/>
  <!-- Data flow dots -->
  <circle cx="32" cy="16" r="1.5" opacity="0.5" fill="#fff"/>
  <circle cx="45" cy="23.5" r="1.5" opacity="0.5" fill="#fff"/>
  <circle cx="45" cy="40.5" r="1.5" opacity="0.5" fill="#fff"/>
  <circle cx="32" cy="48" r="1.5" opacity="0.5" fill="#fff"/>
  <circle cx="19" cy="40.5" r="1.5" opacity="0.5" fill="#fff"/>
  <circle cx="19" cy="23.5" r="1.5" opacity="0.5" fill="#fff"/>
</svg>
