<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-qr" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Quantum Chamber (cryogenic vessel) -->
    <ellipse cx="32" cy="32" rx="16" ry="20" fill="none" stroke="#c026d3" stroke-width="2" filter="url(#neon-glow-qr)"/>
    <!-- Inner cooling rings -->
    <ellipse cx="32" cy="32" rx="12" ry="14" fill="none" stroke="#d946ef" stroke-width="1.5" filter="url(#neon-glow-qr)" opacity="0.7"/>
    <ellipse cx="32" cy="32" rx="8" ry="8" fill="none" stroke="#e879f9" stroke-width="1.5" filter="url(#neon-glow-qr)" opacity="0.8"/>
    <!-- Qubit core (entangled photon pair) -->
    <circle cx="29" cy="32" r="3" fill="#f0abfc" filter="url(#neon-glow-qr)"/>
    <circle cx="35" cy="32" r="3" fill="#f0abfc" filter="url(#neon-glow-qr)"/>
    <!-- Entanglement link between qubits -->
    <path d="M 29 32 Q 32 28 35 32 Q 32 36 29 32" fill="none" stroke="#fdf4ff" stroke-width="1.5" filter="url(#neon-glow-qr)"/>
    <!-- Quantum fiber in/out -->
    <line x1="4" y1="32" x2="16" y2="32" stroke="#e879f9" stroke-width="2" filter="url(#neon-glow-qr)"/>
    <line x1="48" y1="32" x2="60" y2="32" stroke="#e879f9" stroke-width="2" filter="url(#neon-glow-qr)"/>
    <!-- Photon sparkles on fiber -->
    <circle cx="8" cy="32" r="1.5" fill="#fdf4ff" filter="url(#neon-glow-qr)"/>
    <circle cx="56" cy="32" r="1.5" fill="#fdf4ff" filter="url(#neon-glow-qr)"/>
    <!-- Cryogenic cooling lines -->
    <line x1="32" y1="12" x2="32" y2="4" stroke="#7dd3fc" stroke-width="2" filter="url(#neon-glow-qr)"/>
    <line x1="32" y1="52" x2="32" y2="60" stroke="#7dd3fc" stroke-width="2" filter="url(#neon-glow-qr)"/>
    <!-- Temperature indicator -->
    <circle cx="32" cy="4" r="2.5" fill="#38bdf8" filter="url(#neon-glow-qr)"/>
    <circle cx="32" cy="60" r="2.5" fill="#38bdf8" filter="url(#neon-glow-qr)"/>
    <!-- Superposition wave overlay -->
    <path d="M 24 26 Q 28 22 32 26 Q 36 30 40 26" fill="none" stroke="#fdf4ff" stroke-width="0.8" filter="url(#neon-glow-qr)" opacity="0.5"/>
    <path d="M 24 38 Q 28 42 32 38 Q 36 34 40 38" fill="none" stroke="#fdf4ff" stroke-width="0.8" filter="url(#neon-glow-qr)" opacity="0.5"/>
</svg>