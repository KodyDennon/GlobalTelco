<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-fdh" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="fdh-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#3b0764" stop-opacity="0.1"/>
        </linearGradient>
    </defs>
    <!-- FDH Cabinet (street-side enclosure) -->
    <rect x="16" y="14" width="32" height="42" rx="4" fill="url(#fdh-grad)" stroke="#8b5cf6" stroke-width="2" filter="url(#neon-glow-fdh)"/>
    <!-- Splitter Module (feeder in, distribution out) -->
    <rect x="20" y="20" width="24" height="8" rx="2" fill="none" stroke="#a78bfa" stroke-width="1.5" filter="url(#neon-glow-fdh)"/>
    <!-- Feeder fiber input (single thick strand top) -->
    <line x1="32" y1="14" x2="32" y2="8" stroke="#c4b5fd" stroke-width="3" filter="url(#neon-glow-fdh)"/>
    <circle cx="32" cy="6" r="3" fill="#8b5cf6" filter="url(#neon-glow-fdh)"/>
    <!-- Splitter triangle inside -->
    <polygon points="28,22 36,22 32,26" fill="#a78bfa" fill-opacity="0.4" stroke="#c4b5fd" stroke-width="1" filter="url(#neon-glow-fdh)"/>
    <!-- Distribution fiber ports (many outputs) -->
    <circle cx="22" cy="34" r="1.5" fill="#c4b5fd" filter="url(#neon-glow-fdh)"/>
    <circle cx="27" cy="34" r="1.5" fill="#c4b5fd" filter="url(#neon-glow-fdh)"/>
    <circle cx="32" cy="34" r="1.5" fill="#c4b5fd" filter="url(#neon-glow-fdh)"/>
    <circle cx="37" cy="34" r="1.5" fill="#c4b5fd" filter="url(#neon-glow-fdh)"/>
    <circle cx="42" cy="34" r="1.5" fill="#c4b5fd" filter="url(#neon-glow-fdh)"/>
    <circle cx="22" cy="40" r="1.5" fill="#a78bfa" filter="url(#neon-glow-fdh)"/>
    <circle cx="27" cy="40" r="1.5" fill="#a78bfa" filter="url(#neon-glow-fdh)"/>
    <circle cx="32" cy="40" r="1.5" fill="#a78bfa" filter="url(#neon-glow-fdh)"/>
    <circle cx="37" cy="40" r="1.5" fill="#a78bfa" filter="url(#neon-glow-fdh)"/>
    <circle cx="42" cy="40" r="1.5" fill="#a78bfa" filter="url(#neon-glow-fdh)"/>
    <!-- Distribution cables fanning out below -->
    <line x1="22" y1="42" x2="12" y2="56" stroke="#a78bfa" stroke-width="1" filter="url(#neon-glow-fdh)"/>
    <line x1="27" y1="42" x2="20" y2="58" stroke="#c4b5fd" stroke-width="1" filter="url(#neon-glow-fdh)"/>
    <line x1="32" y1="42" x2="32" y2="60" stroke="#c4b5fd" stroke-width="1" filter="url(#neon-glow-fdh)"/>
    <line x1="37" y1="42" x2="44" y2="58" stroke="#c4b5fd" stroke-width="1" filter="url(#neon-glow-fdh)"/>
    <line x1="42" y1="42" x2="52" y2="56" stroke="#a78bfa" stroke-width="1" filter="url(#neon-glow-fdh)"/>
    <!-- Port count indicator -->
    <rect x="22" y="46" width="20" height="3" rx="1" fill="none" stroke="#7c3aed" stroke-width="1" filter="url(#neon-glow-fdh)"/>
</svg>