<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-mgs" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Large Tracking Dish (MEO needs bigger dish) -->
    <path d="M 10 22 Q 32 42 54 22" fill="none" stroke="#60a5fa" stroke-width="2.5" filter="url(#neon-glow-mgs)"/>
    <path d="M 10 22 Q 32 14 54 22" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="3 3" filter="url(#neon-glow-mgs)" opacity="0.4"/>
    <!-- Feed arm -->
    <line x1="32" y1="34" x2="32" y2="16" stroke="#93c5fd" stroke-width="2" filter="url(#neon-glow-mgs)"/>
    <circle cx="32" cy="14" r="3" fill="#bfdbfe" filter="url(#neon-glow-mgs)"/>
    <!-- Support struts -->
    <line x1="20" y1="28" x2="32" y2="14" stroke="#3b82f6" stroke-width="1" filter="url(#neon-glow-mgs)" opacity="0.6"/>
    <line x1="44" y1="28" x2="32" y2="14" stroke="#3b82f6" stroke-width="1" filter="url(#neon-glow-mgs)" opacity="0.6"/>
    <!-- Pedestal/azimuth mount -->
    <rect x="26" y="34" width="12" height="14" fill="none" stroke="#2563eb" stroke-width="2" filter="url(#neon-glow-mgs)"/>
    <!-- Base -->
    <rect x="18" y="48" width="28" height="4" rx="1" fill="none" stroke="#1d4ed8" stroke-width="2" filter="url(#neon-glow-mgs)"/>
    <!-- Uplink signals -->
    <line x1="28" y1="10" x2="22" y2="2" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-mgs)"/>
    <line x1="32" y1="8" x2="32" y2="0" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-mgs)"/>
    <line x1="36" y1="10" x2="42" y2="2" stroke="#93c5fd" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-mgs)"/>
    <!-- Equipment cabinet at side -->
    <rect x="48" y="38" width="10" height="10" rx="1" fill="none" stroke="#3b82f6" stroke-width="1.5" filter="url(#neon-glow-mgs)"/>
    <circle cx="52" cy="42" r="1" fill="#34d399" filter="url(#neon-glow-mgs)"/>
    <!-- Fiber backhaul -->
    <line x1="32" y1="52" x2="32" y2="60" stroke="#60a5fa" stroke-width="2" filter="url(#neon-glow-mgs)"/>
</svg>