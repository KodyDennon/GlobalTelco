<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-sgs" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Large Parabolic Dish -->
    <path d="M 8 20 Q 32 48 56 20" fill="none" stroke="#4ade80" stroke-width="2.5" filter="url(#neon-glow-sgs)"/>
    <path d="M 8 20 Q 32 10 56 20" fill="none" stroke="#4ade80" stroke-width="1.5" stroke-dasharray="3 3" filter="url(#neon-glow-sgs)" opacity="0.5"/>
    <!-- Feed horn arm -->
    <line x1="32" y1="36" x2="32" y2="14" stroke="#86efac" stroke-width="2" filter="url(#neon-glow-sgs)"/>
    <circle cx="32" cy="12" r="3" fill="#bbf7d0" filter="url(#neon-glow-sgs)"/>
    <!-- Dish support struts -->
    <line x1="18" y1="30" x2="32" y2="14" stroke="#22c55e" stroke-width="1" filter="url(#neon-glow-sgs)" opacity="0.6"/>
    <line x1="46" y1="30" x2="32" y2="14" stroke="#22c55e" stroke-width="1" filter="url(#neon-glow-sgs)" opacity="0.6"/>
    <!-- Pedestal/Mount -->
    <rect x="28" y="36" width="8" height="16" fill="none" stroke="#4ade80" stroke-width="2" filter="url(#neon-glow-sgs)"/>
    <!-- Base Platform -->
    <rect x="20" y="52" width="24" height="4" rx="1" fill="none" stroke="#22c55e" stroke-width="2" filter="url(#neon-glow-sgs)"/>
    <!-- Uplink Signal -->
    <line x1="28" y1="8" x2="22" y2="2" stroke="#bbf7d0" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-sgs)"/>
    <line x1="32" y1="6" x2="32" y2="0" stroke="#bbf7d0" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-sgs)"/>
    <line x1="36" y1="8" x2="42" y2="2" stroke="#bbf7d0" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-sgs)"/>
    <!-- Equipment shelter -->
    <rect x="44" y="44" width="12" height="8" rx="1" fill="none" stroke="#22c55e" stroke-width="1.5" filter="url(#neon-glow-sgs)"/>
    <circle cx="48" cy="48" r="1.5" fill="#34d399" filter="url(#neon-glow-sgs)"/>
</svg>