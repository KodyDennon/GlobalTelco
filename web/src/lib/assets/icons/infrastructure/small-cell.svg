<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-sc" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Street Light Pole -->
    <rect x="30" y="20" width="4" height="38" fill="none" stroke="#6b7280" stroke-width="2" filter="url(#neon-glow-sc)"/>
    <!-- Small Cell Unit (compact box on pole) -->
    <rect x="22" y="12" width="20" height="12" rx="3" fill="none" stroke="#a78bfa" stroke-width="2" filter="url(#neon-glow-sc)"/>
    <!-- Mounting bracket -->
    <line x1="30" y1="18" x2="22" y2="18" stroke="#7c3aed" stroke-width="1.5" filter="url(#neon-glow-sc)"/>
    <line x1="34" y1="18" x2="42" y2="18" stroke="#7c3aed" stroke-width="1.5" filter="url(#neon-glow-sc)"/>
    <!-- Antenna elements (MIMO array dots) -->
    <circle cx="26" cy="15" r="1.5" fill="#c4b5fd" filter="url(#neon-glow-sc)"/>
    <circle cx="30" cy="15" r="1.5" fill="#c4b5fd" filter="url(#neon-glow-sc)"/>
    <circle cx="34" cy="15" r="1.5" fill="#c4b5fd" filter="url(#neon-glow-sc)"/>
    <circle cx="38" cy="15" r="1.5" fill="#c4b5fd" filter="url(#neon-glow-sc)"/>
    <circle cx="26" cy="20" r="1.5" fill="#c4b5fd" filter="url(#neon-glow-sc)"/>
    <circle cx="30" cy="20" r="1.5" fill="#c4b5fd" filter="url(#neon-glow-sc)"/>
    <circle cx="34" cy="20" r="1.5" fill="#c4b5fd" filter="url(#neon-glow-sc)"/>
    <circle cx="38" cy="20" r="1.5" fill="#c4b5fd" filter="url(#neon-glow-sc)"/>
    <!-- Short-range signal arcs -->
    <path d="M 18 14 Q 14 18 18 22" fill="none" stroke="#ddd6fe" stroke-width="1.5" filter="url(#neon-glow-sc)" opacity="0.7"/>
    <path d="M 46 14 Q 50 18 46 22" fill="none" stroke="#ddd6fe" stroke-width="1.5" filter="url(#neon-glow-sc)" opacity="0.7"/>
    <!-- Power status LED -->
    <circle cx="24" cy="17" r="1" fill="#34d399" filter="url(#neon-glow-sc)"/>
    <!-- Fiber backhaul connection at base -->
    <circle cx="32" cy="56" r="2" fill="#a78bfa" filter="url(#neon-glow-sc)"/>
    <line x1="32" y1="58" x2="32" y2="62" stroke="#a78bfa" stroke-width="1.5" filter="url(#neon-glow-sc)"/>
</svg>