<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-ds" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="ds-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#4ade80" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#166534" stop-opacity="0.1"/>
        </linearGradient>
    </defs>
    <!-- Main Equipment Cabinet -->
    <rect x="12" y="14" width="40" height="42" rx="3" fill="url(#ds-grad)" stroke="#4ade80" stroke-width="2" filter="url(#neon-glow-ds)"/>
    <!-- Digital Circuit Boards (3 slot cards) -->
    <rect x="16" y="20" width="32" height="8" rx="1" fill="none" stroke="#22c55e" stroke-width="1.5" filter="url(#neon-glow-ds)"/>
    <rect x="16" y="32" width="32" height="8" rx="1" fill="none" stroke="#22c55e" stroke-width="1.5" filter="url(#neon-glow-ds)"/>
    <rect x="16" y="44" width="32" height="8" rx="1" fill="none" stroke="#22c55e" stroke-width="1.5" filter="url(#neon-glow-ds)"/>
    <!-- IC chips on cards -->
    <rect x="20" y="22" width="6" height="4" fill="#166534" stroke="#4ade80" stroke-width="0.5" filter="url(#neon-glow-ds)"/>
    <rect x="30" y="22" width="6" height="4" fill="#166534" stroke="#4ade80" stroke-width="0.5" filter="url(#neon-glow-ds)"/>
    <rect x="40" y="22" width="4" height="4" fill="#166534" stroke="#4ade80" stroke-width="0.5" filter="url(#neon-glow-ds)"/>
    <rect x="20" y="34" width="6" height="4" fill="#166534" stroke="#4ade80" stroke-width="0.5" filter="url(#neon-glow-ds)"/>
    <rect x="30" y="34" width="6" height="4" fill="#166534" stroke="#4ade80" stroke-width="0.5" filter="url(#neon-glow-ds)"/>
    <!-- LED status bar -->
    <circle cx="18" cy="16" r="1.5" fill="#34d399" filter="url(#neon-glow-ds)"/>
    <circle cx="23" cy="16" r="1.5" fill="#34d399" filter="url(#neon-glow-ds)"/>
    <circle cx="28" cy="16" r="1.5" fill="#f59e0b" filter="url(#neon-glow-ds)"/>
    <circle cx="33" cy="16" r="1.5" fill="#34d399" filter="url(#neon-glow-ds)"/>
    <!-- Data bus trace -->
    <line x1="12" y1="36" x2="4" y2="36" stroke="#86efac" stroke-width="2" filter="url(#neon-glow-ds)"/>
    <line x1="52" y1="36" x2="60" y2="36" stroke="#86efac" stroke-width="2" filter="url(#neon-glow-ds)"/>
    <!-- Digital signal indicator -->
    <path d="M 38 46 L 40 46 L 40 48 L 42 48 L 42 46 L 44 46 L 44 48 L 46 48" fill="none" stroke="#86efac" stroke-width="1.5" filter="url(#neon-glow-ds)"/>
</svg>