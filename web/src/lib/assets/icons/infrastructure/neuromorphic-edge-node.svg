<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-nen" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Brain-like neural network pattern -->
    <!-- Outer neural shell -->
    <circle cx="32" cy="32" r="22" fill="none" stroke="#c026d3" stroke-width="1.5" filter="url(#neon-glow-nen)" opacity="0.5"/>
    <!-- Neuron nodes (scattered like brain cells) -->
    <circle cx="20" cy="20" r="3" fill="#d946ef" filter="url(#neon-glow-nen)"/>
    <circle cx="44" cy="18" r="3" fill="#d946ef" filter="url(#neon-glow-nen)"/>
    <circle cx="32" cy="32" r="4" fill="#e879f9" filter="url(#neon-glow-nen)"/>
    <circle cx="18" cy="40" r="3" fill="#d946ef" filter="url(#neon-glow-nen)"/>
    <circle cx="46" cy="42" r="3" fill="#d946ef" filter="url(#neon-glow-nen)"/>
    <circle cx="32" cy="48" r="2.5" fill="#d946ef" filter="url(#neon-glow-nen)"/>
    <circle cx="38" cy="24" r="2" fill="#c026d3" filter="url(#neon-glow-nen)"/>
    <circle cx="24" cy="36" r="2" fill="#c026d3" filter="url(#neon-glow-nen)"/>
    <!-- Synaptic connections (curved dendrites) -->
    <path d="M 20 20 Q 26 16 32 32" fill="none" stroke="#f0abfc" stroke-width="1" filter="url(#neon-glow-nen)"/>
    <path d="M 44 18 Q 40 24 32 32" fill="none" stroke="#f0abfc" stroke-width="1" filter="url(#neon-glow-nen)"/>
    <path d="M 18 40 Q 24 38 32 32" fill="none" stroke="#f0abfc" stroke-width="1" filter="url(#neon-glow-nen)"/>
    <path d="M 46 42 Q 40 38 32 32" fill="none" stroke="#f0abfc" stroke-width="1" filter="url(#neon-glow-nen)"/>
    <path d="M 32 48 Q 32 42 32 32" fill="none" stroke="#f0abfc" stroke-width="1" filter="url(#neon-glow-nen)"/>
    <path d="M 38 24 Q 36 28 32 32" fill="none" stroke="#f0abfc" stroke-width="0.8" filter="url(#neon-glow-nen)"/>
    <path d="M 24 36 Q 28 36 32 32" fill="none" stroke="#f0abfc" stroke-width="0.8" filter="url(#neon-glow-nen)"/>
    <!-- Cross connections -->
    <path d="M 20 20 Q 30 18 44 18" fill="none" stroke="#e879f9" stroke-width="0.8" filter="url(#neon-glow-nen)" opacity="0.5"/>
    <path d="M 18 40 Q 30 46 46 42" fill="none" stroke="#e879f9" stroke-width="0.8" filter="url(#neon-glow-nen)" opacity="0.5"/>
    <!-- Signal pulses traveling along synapses -->
    <circle cx="26" cy="26" r="1" fill="#fdf4ff" filter="url(#neon-glow-nen)"/>
    <circle cx="38" cy="38" r="1" fill="#fdf4ff" filter="url(#neon-glow-nen)"/>
    <circle cx="26" cy="42" r="1" fill="#fdf4ff" filter="url(#neon-glow-nen)"/>
    <!-- Processing core glow -->
    <circle cx="32" cy="32" r="7" fill="none" stroke="#e879f9" stroke-width="1" stroke-dasharray="2 2" filter="url(#neon-glow-nen)" opacity="0.4"/>
    <!-- I/O ports -->
    <line x1="10" y1="32" x2="4" y2="32" stroke="#d946ef" stroke-width="2" filter="url(#neon-glow-nen)"/>
    <line x1="54" y1="32" x2="60" y2="32" stroke="#d946ef" stroke-width="2" filter="url(#neon-glow-nen)"/>
</svg>