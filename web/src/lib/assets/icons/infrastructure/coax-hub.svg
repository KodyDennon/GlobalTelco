<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-cx" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="cx-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#6b7280" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#374151" stop-opacity="0.1"/>
        </linearGradient>
    </defs>
    <!-- Junction Box -->
    <rect x="16" y="20" width="32" height="28" rx="3" fill="url(#cx-grad)" stroke="#9ca3af" stroke-width="2" filter="url(#neon-glow-cx)"/>
    <!-- Coaxial F-connectors (ports) -->
    <circle cx="24" cy="28" r="3" fill="none" stroke="#d1d5db" stroke-width="1.5" filter="url(#neon-glow-cx)"/>
    <circle cx="24" cy="28" r="1" fill="#e5e7eb" filter="url(#neon-glow-cx)"/>
    <circle cx="40" cy="28" r="3" fill="none" stroke="#d1d5db" stroke-width="1.5" filter="url(#neon-glow-cx)"/>
    <circle cx="40" cy="28" r="1" fill="#e5e7eb" filter="url(#neon-glow-cx)"/>
    <circle cx="24" cy="40" r="3" fill="none" stroke="#d1d5db" stroke-width="1.5" filter="url(#neon-glow-cx)"/>
    <circle cx="24" cy="40" r="1" fill="#e5e7eb" filter="url(#neon-glow-cx)"/>
    <circle cx="40" cy="40" r="3" fill="none" stroke="#d1d5db" stroke-width="1.5" filter="url(#neon-glow-cx)"/>
    <circle cx="40" cy="40" r="1" fill="#e5e7eb" filter="url(#neon-glow-cx)"/>
    <!-- Central splitter/amplifier -->
    <rect x="28" y="30" width="8" height="8" rx="1" fill="none" stroke="#4ade80" stroke-width="1.5" filter="url(#neon-glow-cx)"/>
    <circle cx="32" cy="34" r="2" fill="#34d399" filter="url(#neon-glow-cx)"/>
    <!-- Cables coming in -->
    <path d="M 4 28 L 16 28" fill="none" stroke="#9ca3af" stroke-width="3" filter="url(#neon-glow-cx)"/>
    <path d="M 48 28 L 60 28" fill="none" stroke="#9ca3af" stroke-width="3" filter="url(#neon-glow-cx)"/>
    <path d="M 4 40 L 16 40" fill="none" stroke="#9ca3af" stroke-width="3" filter="url(#neon-glow-cx)"/>
    <path d="M 48 40 L 60 40" fill="none" stroke="#9ca3af" stroke-width="3" filter="url(#neon-glow-cx)"/>
    <!-- Internal traces -->
    <line x1="27" y1="28" x2="28" y2="32" stroke="#4ade80" stroke-width="1" filter="url(#neon-glow-cx)"/>
    <line x1="37" y1="28" x2="36" y2="32" stroke="#4ade80" stroke-width="1" filter="url(#neon-glow-cx)"/>
    <line x1="27" y1="40" x2="28" y2="36" stroke="#4ade80" stroke-width="1" filter="url(#neon-glow-cx)"/>
    <line x1="37" y1="40" x2="36" y2="36" stroke="#4ade80" stroke-width="1" filter="url(#neon-glow-cx)"/>
    <!-- Label -->
    <rect x="22" y="16" width="20" height="3" rx="1" fill="none" stroke="#9ca3af" stroke-width="1" filter="url(#neon-glow-cx)"/>
</svg>