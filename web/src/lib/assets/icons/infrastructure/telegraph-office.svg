<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-to" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="to-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#d97706" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#78350f" stop-opacity="0.1"/>
        </linearGradient>
    </defs>
    <!-- Building Frame -->
    <rect x="14" y="26" width="36" height="30" fill="url(#to-grad)" stroke="#d97706" stroke-width="2" filter="url(#neon-glow-to)"/>
    <!-- Peaked Roof -->
    <path d="M 10 26 L 32 12 L 54 26 Z" fill="none" stroke="#f59e0b" stroke-width="2" filter="url(#neon-glow-to)"/>
    <!-- Door -->
    <rect x="28" y="44" width="8" height="12" fill="none" stroke="#fbbf24" stroke-width="1.5" filter="url(#neon-glow-to)"/>
    <!-- Telegraph Key on desk -->
    <rect x="18" y="38" width="10" height="3" rx="1" fill="none" stroke="#fcd34d" stroke-width="1.5" filter="url(#neon-glow-to)"/>
    <circle cx="23" cy="37" r="1.5" fill="#fde68a" filter="url(#neon-glow-to)"/>
    <!-- Wire from roof going right -->
    <line x1="32" y1="12" x2="32" y2="6" stroke="#fbbf24" stroke-width="2" filter="url(#neon-glow-to)"/>
    <line x1="32" y1="6" x2="60" y2="6" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3 2" filter="url(#neon-glow-to)"/>
    <!-- Wire going left -->
    <line x1="32" y1="6" x2="4" y2="6" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3 2" filter="url(#neon-glow-to)"/>
    <!-- Spark/signal indicator -->
    <circle cx="32" cy="6" r="3" fill="#fde68a" filter="url(#neon-glow-to)"/>
    <!-- Window glow -->
    <rect x="38" y="32" width="6" height="6" fill="#fbbf24" fill-opacity="0.3" stroke="#fbbf24" stroke-width="1" filter="url(#neon-glow-to)"/>
</svg>