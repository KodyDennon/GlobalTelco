<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-sf" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="sf-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#78350f" stop-opacity="0.1"/>
        </linearGradient>
    </defs>
    <!-- Factory Building -->
    <rect x="8" y="28" width="48" height="28" rx="2" fill="url(#sf-grad)" stroke="#f59e0b" stroke-width="2" filter="url(#neon-glow-sf)"/>
    <!-- Sawtooth Roof -->
    <path d="M 8 28 L 20 16 L 20 28 L 32 16 L 32 28 L 44 16 L 44 28 L 56 20 L 56 28" fill="none" stroke="#fbbf24" stroke-width="2" filter="url(#neon-glow-sf)"/>
    <!-- Assembly Line (satellite being built) -->
    <rect x="14" y="36" width="12" height="8" rx="1" fill="none" stroke="#fcd34d" stroke-width="1.5" filter="url(#neon-glow-sf)"/>
    <!-- Mini satellite in assembly -->
    <rect x="16" y="38" width="8" height="4" rx="1" fill="none" stroke="#fde68a" stroke-width="1" filter="url(#neon-glow-sf)"/>
    <line x1="14" y1="40" x2="16" y2="40" stroke="#fbbf24" stroke-width="1" filter="url(#neon-glow-sf)"/>
    <line x1="24" y1="40" x2="26" y2="40" stroke="#fbbf24" stroke-width="1" filter="url(#neon-glow-sf)"/>
    <!-- Completed satellite at output -->
    <rect x="38" y="36" width="10" height="6" rx="1" fill="none" stroke="#fde68a" stroke-width="1.5" filter="url(#neon-glow-sf)"/>
    <line x1="34" y1="39" x2="38" y2="39" stroke="#fbbf24" stroke-width="1.5" filter="url(#neon-glow-sf)"/>
    <line x1="48" y1="39" x2="52" y2="39" stroke="#fbbf24" stroke-width="1.5" filter="url(#neon-glow-sf)"/>
    <!-- Production conveyor arrow -->
    <path d="M 28 40 L 34 40" fill="none" stroke="#fbbf24" stroke-width="1.5" filter="url(#neon-glow-sf)"/>
    <path d="M 32 38 L 34 40 L 32 42" fill="none" stroke="#fbbf24" stroke-width="1.5" filter="url(#neon-glow-sf)"/>
    <!-- Status panel -->
    <circle cx="14" cy="50" r="1.5" fill="#34d399" filter="url(#neon-glow-sf)"/>
    <circle cx="20" cy="50" r="1.5" fill="#34d399" filter="url(#neon-glow-sf)"/>
    <circle cx="26" cy="50" r="1.5" fill="#f59e0b" filter="url(#neon-glow-sf)"/>
    <!-- Smokestacks / clean room vents -->
    <rect x="46" y="12" width="4" height="16" fill="none" stroke="#d97706" stroke-width="1.5" filter="url(#neon-glow-sf)"/>
    <path d="M 46 12 Q 44 8 46 6" fill="none" stroke="#fbbf24" stroke-width="1" filter="url(#neon-glow-sf)" opacity="0.4"/>
</svg>