<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-lp" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Launch Tower/Gantry (tall structure) -->
    <path d="M 38 56 L 40 14 L 44 14 L 46 56 Z" fill="none" stroke="#6b7280" stroke-width="1.5" filter="url(#neon-glow-lp)"/>
    <!-- Tower cross braces -->
    <line x1="39" y1="44" x2="45" y2="36" stroke="#4b5563" stroke-width="0.8" filter="url(#neon-glow-lp)"/>
    <line x1="45" y1="44" x2="39" y2="36" stroke="#4b5563" stroke-width="0.8" filter="url(#neon-glow-lp)"/>
    <line x1="40" y1="28" x2="44" y2="20" stroke="#4b5563" stroke-width="0.8" filter="url(#neon-glow-lp)"/>
    <!-- Rocket Body -->
    <path d="M 26 52 L 26 20 Q 30 8 34 20 L 34 52 Z" fill="none" stroke="#f8fafc" stroke-width="2" filter="url(#neon-glow-lp)"/>
    <!-- Nose Cone -->
    <path d="M 26 20 Q 30 8 34 20" fill="none" stroke="#e2e8f0" stroke-width="2" filter="url(#neon-glow-lp)"/>
    <!-- Payload fairing band -->
    <line x1="26" y1="24" x2="34" y2="24" stroke="#fbbf24" stroke-width="2" filter="url(#neon-glow-lp)"/>
    <!-- Engine nozzles -->
    <path d="M 26 52 L 24 58 L 28 56 L 30 58 L 32 56 L 36 58 L 34 52" fill="none" stroke="#f97316" stroke-width="1.5" filter="url(#neon-glow-lp)"/>
    <!-- Engine exhaust flame (launch!) -->
    <path d="M 26 58 Q 30 64 34 58" fill="none" stroke="#ef4444" stroke-width="2" filter="url(#neon-glow-lp)"/>
    <path d="M 28 60 Q 30 66 32 60" fill="none" stroke="#fbbf24" stroke-width="1.5" filter="url(#neon-glow-lp)"/>
    <!-- Umbilical connection from tower to rocket -->
    <line x1="34" y1="36" x2="40" y2="36" stroke="#f59e0b" stroke-width="1.5" filter="url(#neon-glow-lp)"/>
    <!-- Launch pad concrete base -->
    <rect x="14" y="56" width="34" height="4" rx="1" fill="none" stroke="#6b7280" stroke-width="2" filter="url(#neon-glow-lp)"/>
    <!-- Flame trench -->
    <path d="M 22 60 L 22 62 L 38 62 L 38 60" fill="none" stroke="#9ca3af" stroke-width="1" filter="url(#neon-glow-lp)"/>
    <!-- Aviation warning light on tower -->
    <circle cx="42" cy="14" r="2" fill="#ef4444" filter="url(#neon-glow-lp)"/>
    <!-- Lightning rod -->
    <line x1="42" y1="14" x2="42" y2="6" stroke="#6b7280" stroke-width="1.5" filter="url(#neon-glow-lp)"/>
</svg>