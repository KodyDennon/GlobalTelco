  <line x1="32" y1="44" x2="32" y2="58" stroke="currentColor" stroke-width="1" opacity="0.5"/>
  <!-- Windows row 1 -->
  <rect x="12" y="22" width="6" height="6" rx="0.5" opacity="0.3" fill="#fff"/>
  <rect x="22" y="22" width="6" height="6" rx="0.5" opacity="0.3" fill="#fff"/>
  <rect x="36" y="22" width="6" height="6" rx="0.5" opacity="0.3" fill="#fff"/>
  <rect x="46" y="22" width="6" height="6" rx="0.5" opacity="0.3" fill="#fff"/>
  <!-- Windows row 2 -->
  <rect x="12" y="32" width="6" height="6" rx="0.5" opacity="0.3" fill="#fff"/>
  <rect x="22" y="32" width="6" height="6" rx="0.5" opacity="0.3" fill="#fff"/>
  <rect x="36" y="32" width="6" height="6" rx="0.5" opacity="0.3" fill="#fff"/>
  <rect x="46" y="32" width="6" height="6" rx="0.5" opacity="0.3" fill="#fff"/>
  <!-- Windows row 3 -->
  <rect x="12" y="44" width="6" height="6" rx="0.5" opacity="0.3" fill="#fff"/>
  <rect x="46" y="44" width="6" height="6" rx="0.5" opacity="0.3" fill="#fff"/>
  <!-- Rooftop antenna mast -->
  <rect x="30.5" y="2" width="3" height="14" rx="0.5"/>
