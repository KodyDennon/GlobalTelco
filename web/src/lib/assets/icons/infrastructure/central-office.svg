<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-co" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="office-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#4c1d95" stop-opacity="0.1"/>
        </linearGradient>
    </defs>
    <!-- Main Building Block -->
    <rect x="16" y="24" width="32" height="36" fill="url(#office-grad)" stroke="#a78bfa" stroke-width="2" filter="url(#neon-glow-co)"/>
    <!-- Left Wing -->
    <rect x="8" y="36" width="8" height="24" fill="none" stroke="#8b5cf6" stroke-width="1.5" filter="url(#neon-glow-co)"/>
    <!-- Right Wing -->
    <rect x="48" y="36" width="8" height="24" fill="none" stroke="#8b5cf6" stroke-width="1.5" filter="url(#neon-glow-co)"/>
    
    <!-- Roof Antenna -->
    <line x1="32" y1="24" x2="32" y2="10" stroke="#c4b5fd" stroke-width="2" filter="url(#neon-glow-co)"/>
    <!-- Data Lines (glowing windows) -->
    <line x1="22" y1="32" x2="42" y2="32" stroke="#c4b5fd" stroke-width="2" stroke-dasharray="2 4" filter="url(#neon-glow-co)"/>
    <line x1="22" y1="40" x2="42" y2="40" stroke="#c4b5fd" stroke-width="2" stroke-dasharray="2 4" filter="url(#neon-glow-co)"/>
    <line x1="22" y1="48" x2="42" y2="48" stroke="#c4b5fd" stroke-width="2" stroke-dasharray="2 4" filter="url(#neon-glow-co)"/>
    
    <!-- Server Core Indicator -->
    <circle cx="32" cy="54" r="3" fill="#f472b6" filter="url(#neon-glow-co)"/>
</svg>
