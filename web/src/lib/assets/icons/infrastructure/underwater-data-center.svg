<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-udc" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="udc-water" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#0c4a6e" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#082f49" stop-opacity="0.2"/>
        </linearGradient>
    </defs>
    <!-- Water surface waves -->
    <path d="M 0 12 Q 8 8 16 12 T 32 12 T 48 12 T 64 12" fill="none" stroke="#38bdf8" stroke-width="1.5" filter="url(#neon-glow-udc)" opacity="0.5"/>
    <!-- Submarine Capsule (cylindrical vessel) -->
    <ellipse cx="32" cy="36" rx="20" ry="12" fill="url(#udc-water)" stroke="#0ea5e9" stroke-width="2" filter="url(#neon-glow-udc)"/>
    <!-- End caps -->
    <path d="M 12 36 Q 12 24 16 24" fill="none" stroke="#0ea5e9" stroke-width="1.5" filter="url(#neon-glow-udc)"/>
    <path d="M 52 36 Q 52 24 48 24" fill="none" stroke="#0ea5e9" stroke-width="1.5" filter="url(#neon-glow-udc)"/>
    <!-- Server racks inside (visible through porthole) -->
    <rect x="22" y="30" width="6" height="10" rx="1" fill="none" stroke="#38bdf8" stroke-width="1" filter="url(#neon-glow-udc)"/>
    <rect x="30" y="30" width="6" height="10" rx="1" fill="none" stroke="#38bdf8" stroke-width="1" filter="url(#neon-glow-udc)"/>
    <rect x="38" y="30" width="6" height="10" rx="1" fill="none" stroke="#38bdf8" stroke-width="1" filter="url(#neon-glow-udc)"/>
    <!-- Server LEDs -->
    <circle cx="24" cy="33" r="1" fill="#34d399" filter="url(#neon-glow-udc)"/>
    <circle cx="32" cy="33" r="1" fill="#34d399" filter="url(#neon-glow-udc)"/>
    <circle cx="40" cy="33" r="1" fill="#f59e0b" filter="url(#neon-glow-udc)"/>
    <!-- Power/data cable to surface -->
    <path d="M 32 24 C 32 18 34 14 36 12" fill="none" stroke="#7dd3fc" stroke-width="2.5" filter="url(#neon-glow-udc)"/>
    <!-- Anchor chains -->
    <line x1="18" y1="48" x2="14" y2="58" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-udc)"/>
    <line x1="46" y1="48" x2="50" y2="58" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-udc)"/>
    <!-- Bubbles (cooling exhaust) -->
    <circle cx="26" cy="22" r="1.5" fill="none" stroke="#7dd3fc" stroke-width="1" filter="url(#neon-glow-udc)" opacity="0.6"/>
    <circle cx="38" cy="20" r="1" fill="none" stroke="#7dd3fc" stroke-width="1" filter="url(#neon-glow-udc)" opacity="0.4"/>
    <circle cx="30" cy="18" r="0.8" fill="none" stroke="#7dd3fc" stroke-width="1" filter="url(#neon-glow-udc)" opacity="0.5"/>
    <!-- Seabed -->
    <path d="M 4 60 Q 16 56 32 60 Q 48 64 60 60" fill="none" stroke="#0c4a6e" stroke-width="1.5" filter="url(#neon-glow-udc)" opacity="0.4"/>
</svg>