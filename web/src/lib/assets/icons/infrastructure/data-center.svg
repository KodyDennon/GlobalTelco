<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-dc" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="dc-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0.1"/>
        </linearGradient>
    </defs>
    <!-- Server Rack Frame -->
    <rect x="12" y="16" width="40" height="40" rx="4" fill="url(#dc-grad)" stroke="#60a5fa" stroke-width="2" filter="url(#neon-glow-dc)"/>
    <!-- Inner Database Drives -->
    <rect x="18" y="24" width="28" height="6" rx="2" fill="none" stroke="#60a5fa" stroke-width="1.5" filter="url(#neon-glow-dc)"/>
    <rect x="18" y="34" width="28" height="6" rx="2" fill="none" stroke="#60a5fa" stroke-width="1.5" filter="url(#neon-glow-dc)"/>
    <rect x="18" y="44" width="28" height="6" rx="2" fill="none" stroke="#60a5fa" stroke-width="1.5" filter="url(#neon-glow-dc)"/>
    
    <!-- Drive Lights (Blinking aesthetics) -->
    <circle cx="22" cy="27" r="1.5" fill="#34d399" filter="url(#neon-glow-dc)"/>
    <circle cx="26" cy="27" r="1.5" fill="#34d399" filter="url(#neon-glow-dc)"/>
    <circle cx="22" cy="37" r="1.5" fill="#34d399" filter="url(#neon-glow-dc)"/>
    <circle cx="26" cy="37" r="1.5" fill="#f43f5e" filter="url(#neon-glow-dc)"/>
    <circle cx="22" cy="47" r="1.5" fill="#34d399" filter="url(#neon-glow-dc)"/>
    <circle cx="26" cy="47" r="1.5" fill="#34d399" filter="url(#neon-glow-dc)"/>
    
    <!-- Top Cooling Vents / Wiring -->
    <line x1="20" y1="16" x2="20" y2="8" stroke="#93c5fd" stroke-width="2" filter="url(#neon-glow-dc)"/>
    <line x1="32" y1="16" x2="32" y2="6" stroke="#93c5fd" stroke-width="2" filter="url(#neon-glow-dc)"/>
    <line x1="44" y1="16" x2="44" y2="8" stroke="#93c5fd" stroke-width="2" filter="url(#neon-glow-dc)"/>
</svg>
