<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="currentColor">
  <!-- Building shell -->
  <rect x="4" y="8" width="56" height="50" rx="2"/>
  <!-- Roof line -->
  <rect x="2" y="6" width="60" height="4" rx="1" opacity="0.8"/>
  <!-- Server rack 1 -->
  <rect x="8" y="12" width="22" height="8" rx="1" opacity="0.25" fill="#fff"/>
  <rect x="10" y="14" width="4" height="1.5" rx="0.5" opacity="0.6" fill="#fff"/>
  <rect x="10" y="17" width="4" height="1.5" rx="0.5" opacity="0.6" fill="#fff"/>
  <circle cx="27" cy="15" r="1" fill="#fff" opacity="0.8"/>
  <circle cx="27" cy="18" r="1" opacity="0.4" fill="#fff"/>
  <!-- Server rack 2 -->
  <rect x="8" y="23" width="22" height="8" rx="1" opacity="0.25" fill="#fff"/>
  <rect x="10" y="25" width="4" height="1.5" rx="0.5" opacity="0.6" fill="#fff"/>
  <rect x="10" y="28" width="4" height="1.5" rx="0.5" opacity="0.6" fill="#fff"/>
  <circle cx="27" cy="26" r="1" fill="#fff" opacity="0.8"/>
  <circle cx="27" cy="29" r="1" fill="#fff" opacity="0.8"/>
  <!-- Server rack 3 -->
  <rect x="8" y="34" width="22" height="8" rx="1" opacity="0.25" fill="#fff"/>
  <rect x="10" y="36" width="4" height="1.5" rx="0.5" opacity="0.6" fill="#fff"/>
  <rect x="10" y="39" width="4" height="1.5" rx="0.5" opacity="0.6" fill="#fff"/>
  <circle cx="27" cy="37" r="1" fill="#fff" opacity="0.8"/>
  <circle cx="27" cy="40" r="1" fill="#fff" opacity="0.8"/>
  <!-- Server rack 4 -->
  <rect x="8" y="45" width="22" height="8" rx="1" opacity="0.25" fill="#fff"/>
  <rect x="10" y="47" width="4" height="1.5" rx="0.5" opacity="0.6" fill="#fff"/>
  <rect x="10" y="50" width="4" height="1.5" rx="0.5" opacity="0.6" fill="#fff"/>
  <circle cx="27" cy="48" r="1" fill="#fff" opacity="0.8"/>
  <circle cx="27" cy="51" r="1" opacity="0.4" fill="#fff"/>
  <!-- Right side - cooling / power -->
  <rect x="34" y="12" width="22" height="20" rx="1" opacity="0.15" fill="#fff"/>
  <!-- Cooling fan -->
  <circle cx="45" cy="22" r="7" fill="none" stroke="#fff" stroke-width="1.5" opacity="0.3"/>
  <circle cx="45" cy="22" r="2" opacity="0.3" fill="#fff"/>
  <line x1="45" y1="15" x2="45" y2="29" stroke="#fff" stroke-width="0.75" opacity="0.2"/>
  <line x1="38" y1="22" x2="52" y2="22" stroke="#fff" stroke-width="0.75" opacity="0.2"/>
  <!-- Power/UPS -->
  <rect x="34" y="35" width="22" height="18" rx="1" opacity="0.15" fill="#fff"/>
  <rect x="37" y="38" width="7" height="12" rx="0.5" opacity="0.2" fill="#fff"/>
  <rect x="46" y="38" width="7" height="12" rx="0.5" opacity="0.2" fill="#fff"/>
  <!-- Status indicator -->
  <circle cx="40.5" cy="42" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="49.5" cy="42" r="1" fill="#fff" opacity="0.6"/>
  <!-- Foundation -->
  <rect x="2" y="58" width="60" height="4" rx="1" opacity="0.5"/>
</svg>
