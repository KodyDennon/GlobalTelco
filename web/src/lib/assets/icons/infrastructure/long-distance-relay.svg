<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-ldr" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Tall Steel Tower Structure -->
    <path d="M 26 58 L 30 10 L 34 10 L 38 58 Z" fill="none" stroke="#ea580c" stroke-width="2" filter="url(#neon-glow-ldr)"/>
    <!-- Cross Bracing -->
    <line x1="27" y1="48" x2="37" y2="38" stroke="#c2410c" stroke-width="1" filter="url(#neon-glow-ldr)" opacity="0.7"/>
    <line x1="37" y1="48" x2="27" y2="38" stroke="#c2410c" stroke-width="1" filter="url(#neon-glow-ldr)" opacity="0.7"/>
    <line x1="28" y1="38" x2="36" y2="28" stroke="#c2410c" stroke-width="1" filter="url(#neon-glow-ldr)" opacity="0.7"/>
    <line x1="36" y1="38" x2="28" y2="28" stroke="#c2410c" stroke-width="1" filter="url(#neon-glow-ldr)" opacity="0.7"/>
    <line x1="29" y1="28" x2="35" y2="18" stroke="#c2410c" stroke-width="1" filter="url(#neon-glow-ldr)" opacity="0.7"/>
    <line x1="35" y1="28" x2="29" y2="18" stroke="#c2410c" stroke-width="1" filter="url(#neon-glow-ldr)" opacity="0.7"/>
    <!-- Top Platform -->
    <rect x="24" y="10" width="16" height="3" rx="1" fill="none" stroke="#fb923c" stroke-width="2" filter="url(#neon-glow-ldr)"/>
    <!-- Amplifier Equipment Box on top -->
    <rect x="28" y="4" width="8" height="6" rx="1" fill="none" stroke="#f97316" stroke-width="1.5" filter="url(#neon-glow-ldr)"/>
    <!-- Signal indicator on top -->
    <circle cx="32" cy="3" r="2.5" fill="#fde68a" filter="url(#neon-glow-ldr)"/>
    <!-- Wire connections from sides -->
    <line x1="4" y1="10" x2="24" y2="10" stroke="#fbbf24" stroke-width="1.5" filter="url(#neon-glow-ldr)"/>
    <line x1="40" y1="10" x2="60" y2="10" stroke="#fbbf24" stroke-width="1.5" filter="url(#neon-glow-ldr)"/>
    <!-- Signal arcs -->
    <path d="M 18 6 Q 32 -2 46 6" fill="none" stroke="#fde68a" stroke-width="1.5" stroke-dasharray="3 2" filter="url(#neon-glow-ldr)" opacity="0.6"/>
    <!-- Base footings -->
    <line x1="20" y1="58" x2="44" y2="58" stroke="#ea580c" stroke-width="2" filter="url(#neon-glow-ldr)"/>
</svg>