<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-edcm" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="edcm-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#3b0764" stop-opacity="0.1"/>
        </linearGradient>
    </defs>
    <!-- Compact Container Form Factor -->
    <rect x="10" y="22" width="44" height="28" rx="4" fill="url(#edcm-grad)" stroke="#8b5cf6" stroke-width="2" filter="url(#neon-glow-edcm)"/>
    <!-- Edge Computing Badge (lightning bolt = low latency) -->
    <path d="M 32 14 L 28 22 L 33 22 L 29 30 L 36 20 L 31 20 L 35 14 Z" fill="#a78bfa" fill-opacity="0.6" stroke="#c4b5fd" stroke-width="1" filter="url(#neon-glow-edcm)"/>
    <!-- Blade Server Slots (compact) -->
    <rect x="14" y="26" width="18" height="5" rx="1" fill="none" stroke="#a78bfa" stroke-width="1.5" filter="url(#neon-glow-edcm)"/>
    <rect x="14" y="33" width="18" height="5" rx="1" fill="none" stroke="#a78bfa" stroke-width="1.5" filter="url(#neon-glow-edcm)"/>
    <rect x="14" y="40" width="18" height="5" rx="1" fill="none" stroke="#a78bfa" stroke-width="1.5" filter="url(#neon-glow-edcm)"/>
    <!-- LEDs -->
    <circle cx="16" cy="28" r="1" fill="#34d399" filter="url(#neon-glow-edcm)"/>
    <circle cx="20" cy="28" r="1" fill="#34d399" filter="url(#neon-glow-edcm)"/>
    <circle cx="16" cy="35" r="1" fill="#34d399" filter="url(#neon-glow-edcm)"/>
    <circle cx="20" cy="35" r="1" fill="#f59e0b" filter="url(#neon-glow-edcm)"/>
    <circle cx="16" cy="42" r="1" fill="#34d399" filter="url(#neon-glow-edcm)"/>
    <!-- Network/Processing Section -->
    <rect x="36" y="26" width="14" height="20" rx="2" fill="none" stroke="#7c3aed" stroke-width="1.5" filter="url(#neon-glow-edcm)"/>
    <!-- Circuit pattern inside -->
    <line x1="39" y1="30" x2="47" y2="30" stroke="#c4b5fd" stroke-width="0.8" filter="url(#neon-glow-edcm)"/>
    <line x1="43" y1="28" x2="43" y2="44" stroke="#c4b5fd" stroke-width="0.8" filter="url(#neon-glow-edcm)"/>
    <circle cx="43" cy="36" r="3" fill="none" stroke="#a78bfa" stroke-width="1.5" filter="url(#neon-glow-edcm)"/>
    <circle cx="43" cy="36" r="1" fill="#c4b5fd" filter="url(#neon-glow-edcm)"/>
    <!-- Fiber ports bottom -->
    <circle cx="20" cy="50" r="2" fill="#8b5cf6" filter="url(#neon-glow-edcm)"/>
    <circle cx="32" cy="50" r="2" fill="#8b5cf6" filter="url(#neon-glow-edcm)"/>
    <circle cx="44" cy="50" r="2" fill="#8b5cf6" filter="url(#neon-glow-edcm)"/>
    <line x1="20" y1="52" x2="20" y2="58" stroke="#a78bfa" stroke-width="1.5" filter="url(#neon-glow-edcm)"/>
    <line x1="32" y1="52" x2="32" y2="58" stroke="#a78bfa" stroke-width="1.5" filter="url(#neon-glow-edcm)"/>
    <line x1="44" y1="52" x2="44" y2="58" stroke="#a78bfa" stroke-width="1.5" filter="url(#neon-glow-edcm)"/>
</svg>