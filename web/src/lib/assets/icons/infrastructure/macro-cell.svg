<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-mc" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Main Tower Mast -->
    <rect x="29" y="8" width="6" height="50" fill="none" stroke="#8b5cf6" stroke-width="2" filter="url(#neon-glow-mc)"/>
    <!-- Sector Antennas (3 panels at 120 degrees) -->
    <rect x="18" y="10" width="3" height="14" rx="1" fill="none" stroke="#a78bfa" stroke-width="2" filter="url(#neon-glow-mc)"/>
    <rect x="43" y="10" width="3" height="14" rx="1" fill="none" stroke="#a78bfa" stroke-width="2" filter="url(#neon-glow-mc)"/>
    <rect x="30" y="4" width="4" height="6" rx="1" fill="none" stroke="#a78bfa" stroke-width="2" filter="url(#neon-glow-mc)"/>
    <!-- Antenna arms -->
    <line x1="29" y1="14" x2="21" y2="14" stroke="#7c3aed" stroke-width="1.5" filter="url(#neon-glow-mc)"/>
    <line x1="35" y1="14" x2="43" y2="14" stroke="#7c3aed" stroke-width="1.5" filter="url(#neon-glow-mc)"/>
    <!-- Signal waves from each sector -->
    <path d="M 14 12 Q 10 17 14 22" fill="none" stroke="#c4b5fd" stroke-width="1.5" filter="url(#neon-glow-mc)" opacity="0.7"/>
    <path d="M 10 10 Q 4 17 10 24" fill="none" stroke="#c4b5fd" stroke-width="1.5" filter="url(#neon-glow-mc)" opacity="0.4"/>
    <path d="M 50 12 Q 54 17 50 22" fill="none" stroke="#c4b5fd" stroke-width="1.5" filter="url(#neon-glow-mc)" opacity="0.7"/>
    <path d="M 54 10 Q 60 17 54 24" fill="none" stroke="#c4b5fd" stroke-width="1.5" filter="url(#neon-glow-mc)" opacity="0.4"/>
    <!-- Equipment cabinet at base -->
    <rect x="22" y="48" width="20" height="10" rx="2" fill="none" stroke="#7c3aed" stroke-width="1.5" filter="url(#neon-glow-mc)"/>
    <circle cx="26" cy="53" r="1.5" fill="#34d399" filter="url(#neon-glow-mc)"/>
    <circle cx="32" cy="53" r="1.5" fill="#34d399" filter="url(#neon-glow-mc)"/>
    <circle cx="38" cy="53" r="1.5" fill="#f59e0b" filter="url(#neon-glow-mc)"/>
    <!-- Power/fiber feed line -->
    <line x1="22" y1="53" x2="14" y2="53" stroke="#a78bfa" stroke-width="1.5" filter="url(#neon-glow-mc)"/>
    <!-- Aviation light -->
    <circle cx="32" cy="4" r="2" fill="#ef4444" filter="url(#neon-glow-mc)"/>
    <!-- Guy wires -->
    <line x1="29" y1="30" x2="12" y2="58" stroke="#6d28d9" stroke-width="0.8" filter="url(#neon-glow-mc)" opacity="0.4"/>
    <line x1="35" y1="30" x2="52" y2="58" stroke="#6d28d9" stroke-width="0.8" filter="url(#neon-glow-mc)" opacity="0.4"/>
</svg>