<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-mt" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Lattice Tower Structure -->
    <path d="M 24 58 L 30 8 L 34 8 L 40 58 Z" fill="none" stroke="#6b7280" stroke-width="2" filter="url(#neon-glow-mt)"/>
    <!-- Cross Bracing -->
    <line x1="25" y1="48" x2="39" y2="38" stroke="#4b5563" stroke-width="1" filter="url(#neon-glow-mt)"/>
    <line x1="39" y1="48" x2="25" y2="38" stroke="#4b5563" stroke-width="1" filter="url(#neon-glow-mt)"/>
    <line x1="27" y1="28" x2="37" y2="18" stroke="#4b5563" stroke-width="1" filter="url(#neon-glow-mt)"/>
    <line x1="37" y1="28" x2="27" y2="18" stroke="#4b5563" stroke-width="1" filter="url(#neon-glow-mt)"/>
    <!-- Microwave Dish (left-facing, at top) -->
    <path d="M 20 14 Q 14 22 20 30" fill="none" stroke="#22d3ee" stroke-width="2.5" filter="url(#neon-glow-mt)"/>
    <line x1="30" y1="22" x2="20" y2="22" stroke="#22d3ee" stroke-width="2" filter="url(#neon-glow-mt)"/>
    <circle cx="20" cy="22" r="2" fill="#67e8f9" filter="url(#neon-glow-mt)"/>
    <!-- Microwave Dish (right-facing, lower) -->
    <path d="M 44 28 Q 50 36 44 44" fill="none" stroke="#22d3ee" stroke-width="2.5" filter="url(#neon-glow-mt)"/>
    <line x1="34" y1="36" x2="44" y2="36" stroke="#22d3ee" stroke-width="2" filter="url(#neon-glow-mt)"/>
    <circle cx="44" cy="36" r="2" fill="#67e8f9" filter="url(#neon-glow-mt)"/>
    <!-- Signal Beams -->
    <path d="M 10 20 Q 4 22 10 24" fill="none" stroke="#67e8f9" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-mt)" opacity="0.6"/>
    <path d="M 54 34 Q 60 36 54 38" fill="none" stroke="#67e8f9" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-mt)" opacity="0.6"/>
    <!-- Aviation warning light -->
    <circle cx="32" cy="8" r="2.5" fill="#ef4444" filter="url(#neon-glow-mt)"/>
    <!-- Base -->
    <line x1="18" y1="58" x2="46" y2="58" stroke="#6b7280" stroke-width="2" filter="url(#neon-glow-mt)"/>
</svg>