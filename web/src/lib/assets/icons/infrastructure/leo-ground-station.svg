<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-lgs" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Multiple Phased Array Antennas (LEO needs tracking) -->
    <rect x="6" y="10" width="16" height="6" rx="1" fill="none" stroke="#38bdf8" stroke-width="2" filter="url(#neon-glow-lgs)"/>
    <rect x="42" y="10" width="16" height="6" rx="1" fill="none" stroke="#38bdf8" stroke-width="2" filter="url(#neon-glow-lgs)"/>
    <!-- Array elements -->
    <circle cx="10" cy="13" r="1" fill="#7dd3fc" filter="url(#neon-glow-lgs)"/>
    <circle cx="14" cy="13" r="1" fill="#7dd3fc" filter="url(#neon-glow-lgs)"/>
    <circle cx="18" cy="13" r="1" fill="#7dd3fc" filter="url(#neon-glow-lgs)"/>
    <circle cx="46" cy="13" r="1" fill="#7dd3fc" filter="url(#neon-glow-lgs)"/>
    <circle cx="50" cy="13" r="1" fill="#7dd3fc" filter="url(#neon-glow-lgs)"/>
    <circle cx="54" cy="13" r="1" fill="#7dd3fc" filter="url(#neon-glow-lgs)"/>
    <!-- Tracking beams going up -->
    <line x1="14" y1="10" x2="10" y2="2" stroke="#67e8f9" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-lgs)" opacity="0.6"/>
    <line x1="50" y1="10" x2="54" y2="2" stroke="#67e8f9" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-lgs)" opacity="0.6"/>
    <!-- Support pedestals -->
    <rect x="12" y="16" width="4" height="10" fill="none" stroke="#0ea5e9" stroke-width="1.5" filter="url(#neon-glow-lgs)"/>
    <rect x="48" y="16" width="4" height="10" fill="none" stroke="#0ea5e9" stroke-width="1.5" filter="url(#neon-glow-lgs)"/>
    <!-- Equipment Shelter -->
    <rect x="16" y="28" width="32" height="20" rx="3" fill="none" stroke="#0ea5e9" stroke-width="2" filter="url(#neon-glow-lgs)"/>
    <!-- Server racks inside -->
    <rect x="20" y="32" width="10" height="12" rx="1" fill="none" stroke="#38bdf8" stroke-width="1" filter="url(#neon-glow-lgs)"/>
    <rect x="34" y="32" width="10" height="12" rx="1" fill="none" stroke="#38bdf8" stroke-width="1" filter="url(#neon-glow-lgs)"/>
    <!-- Status LEDs -->
    <circle cx="22" cy="35" r="1" fill="#34d399" filter="url(#neon-glow-lgs)"/>
    <circle cx="22" cy="39" r="1" fill="#34d399" filter="url(#neon-glow-lgs)"/>
    <circle cx="36" cy="35" r="1" fill="#34d399" filter="url(#neon-glow-lgs)"/>
    <circle cx="36" cy="39" r="1" fill="#f59e0b" filter="url(#neon-glow-lgs)"/>
    <!-- Fiber backhaul -->
    <line x1="32" y1="48" x2="32" y2="58" stroke="#38bdf8" stroke-width="2" filter="url(#neon-glow-lgs)"/>
    <circle cx="32" cy="60" r="2.5" fill="#0ea5e9" filter="url(#neon-glow-lgs)"/>
</svg>