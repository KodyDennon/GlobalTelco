<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-hdc" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="hdc-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#2e1065" stop-opacity="0.1"/>
        </linearGradient>
    </defs>
    <!-- Massive Building Footprint -->
    <rect x="4" y="20" width="56" height="36" rx="3" fill="url(#hdc-grad)" stroke="#7c3aed" stroke-width="2.5" filter="url(#neon-glow-hdc)"/>
    <!-- Second Floor / Wing -->
    <rect x="8" y="16" width="48" height="8" rx="2" fill="none" stroke="#8b5cf6" stroke-width="2" filter="url(#neon-glow-hdc)"/>
    <!-- Dense Server Row Blocks (5 halls) -->
    <rect x="8" y="26" width="10" height="24" fill="none" stroke="#a78bfa" stroke-width="1" filter="url(#neon-glow-hdc)"/>
    <rect x="20" y="26" width="10" height="24" fill="none" stroke="#a78bfa" stroke-width="1" filter="url(#neon-glow-hdc)"/>
    <rect x="32" y="26" width="10" height="24" fill="none" stroke="#a78bfa" stroke-width="1" filter="url(#neon-glow-hdc)"/>
    <rect x="44" y="26" width="14" height="24" fill="none" stroke="#a78bfa" stroke-width="1" filter="url(#neon-glow-hdc)"/>
    <!-- Server rack lines in halls -->
    <line x1="10" y1="30" x2="16" y2="30" stroke="#c4b5fd" stroke-width="0.8" filter="url(#neon-glow-hdc)"/>
    <line x1="10" y1="34" x2="16" y2="34" stroke="#c4b5fd" stroke-width="0.8" filter="url(#neon-glow-hdc)"/>
    <line x1="10" y1="38" x2="16" y2="38" stroke="#c4b5fd" stroke-width="0.8" filter="url(#neon-glow-hdc)"/>
    <line x1="10" y1="42" x2="16" y2="42" stroke="#c4b5fd" stroke-width="0.8" filter="url(#neon-glow-hdc)"/>
    <line x1="22" y1="30" x2="28" y2="30" stroke="#c4b5fd" stroke-width="0.8" filter="url(#neon-glow-hdc)"/>
    <line x1="22" y1="34" x2="28" y2="34" stroke="#c4b5fd" stroke-width="0.8" filter="url(#neon-glow-hdc)"/>
    <line x1="22" y1="38" x2="28" y2="38" stroke="#c4b5fd" stroke-width="0.8" filter="url(#neon-glow-hdc)"/>
    <line x1="34" y1="30" x2="40" y2="30" stroke="#c4b5fd" stroke-width="0.8" filter="url(#neon-glow-hdc)"/>
    <line x1="34" y1="34" x2="40" y2="34" stroke="#c4b5fd" stroke-width="0.8" filter="url(#neon-glow-hdc)"/>
    <line x1="34" y1="38" x2="40" y2="38" stroke="#c4b5fd" stroke-width="0.8" filter="url(#neon-glow-hdc)"/>
    <line x1="34" y1="42" x2="40" y2="42" stroke="#c4b5fd" stroke-width="0.8" filter="url(#neon-glow-hdc)"/>
    <!-- Cooling towers on roof -->
    <circle cx="16" cy="12" r="3" fill="none" stroke="#93c5fd" stroke-width="1.5" filter="url(#neon-glow-hdc)"/>
    <circle cx="32" cy="12" r="3" fill="none" stroke="#93c5fd" stroke-width="1.5" filter="url(#neon-glow-hdc)"/>
    <circle cx="48" cy="12" r="3" fill="none" stroke="#93c5fd" stroke-width="1.5" filter="url(#neon-glow-hdc)"/>
    <!-- Power substations -->
    <rect x="46" y="28" width="10" height="6" fill="none" stroke="#f59e0b" stroke-width="1" filter="url(#neon-glow-hdc)"/>
    <circle cx="49" cy="31" r="1" fill="#fbbf24" filter="url(#neon-glow-hdc)"/>
    <circle cx="53" cy="31" r="1" fill="#fbbf24" filter="url(#neon-glow-hdc)"/>
    <!-- Scale indicator: MW power label -->
    <rect x="46" y="38" width="10" height="4" fill="#6d28d9" fill-opacity="0.4" stroke="#a78bfa" stroke-width="0.5" filter="url(#neon-glow-hdc)"/>
</svg>