<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-nap" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Central NAP Hub -->
    <circle cx="32" cy="32" r="14" fill="none" stroke="#8b5cf6" stroke-width="2" filter="url(#neon-glow-nap)"/>
    <circle cx="32" cy="32" r="8" fill="none" stroke="#a78bfa" stroke-width="1.5" filter="url(#neon-glow-nap)"/>
    <circle cx="32" cy="32" r="3" fill="#c4b5fd" filter="url(#neon-glow-nap)"/>
    <!-- Access ports (8 directions like compass) -->
    <line x1="32" y1="18" x2="32" y2="8" stroke="#a78bfa" stroke-width="2" filter="url(#neon-glow-nap)"/>
    <line x1="32" y1="46" x2="32" y2="56" stroke="#a78bfa" stroke-width="2" filter="url(#neon-glow-nap)"/>
    <line x1="18" y1="32" x2="8" y2="32" stroke="#a78bfa" stroke-width="2" filter="url(#neon-glow-nap)"/>
    <line x1="46" y1="32" x2="56" y2="32" stroke="#a78bfa" stroke-width="2" filter="url(#neon-glow-nap)"/>
    <!-- Diagonal access lines -->
    <line x1="22" y1="22" x2="14" y2="14" stroke="#7c3aed" stroke-width="1.5" filter="url(#neon-glow-nap)"/>
    <line x1="42" y1="22" x2="50" y2="14" stroke="#7c3aed" stroke-width="1.5" filter="url(#neon-glow-nap)"/>
    <line x1="22" y1="42" x2="14" y2="50" stroke="#7c3aed" stroke-width="1.5" filter="url(#neon-glow-nap)"/>
    <line x1="42" y1="42" x2="50" y2="50" stroke="#7c3aed" stroke-width="1.5" filter="url(#neon-glow-nap)"/>
    <!-- Endpoint connection indicators -->
    <rect x="29" y="6" width="6" height="4" rx="1" fill="#8b5cf6" filter="url(#neon-glow-nap)"/>
    <rect x="29" y="54" width="6" height="4" rx="1" fill="#8b5cf6" filter="url(#neon-glow-nap)"/>
    <rect x="6" y="29" width="4" height="6" rx="1" fill="#8b5cf6" filter="url(#neon-glow-nap)"/>
    <rect x="54" y="29" width="4" height="6" rx="1" fill="#8b5cf6" filter="url(#neon-glow-nap)"/>
    <!-- Active status glow on inner ring -->
    <circle cx="26" cy="26" r="1.5" fill="#34d399" filter="url(#neon-glow-nap)"/>
    <circle cx="38" cy="26" r="1.5" fill="#34d399" filter="url(#neon-glow-nap)"/>
    <circle cx="26" cy="38" r="1.5" fill="#34d399" filter="url(#neon-glow-nap)"/>
    <circle cx="38" cy="38" r="1.5" fill="#f59e0b" filter="url(#neon-glow-nap)"/>
</svg>