<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-fsp" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Splice Enclosure (elongated oval) -->
    <ellipse cx="32" cy="32" rx="22" ry="10" fill="none" stroke="#8b5cf6" stroke-width="2" filter="url(#neon-glow-fsp)"/>
    <!-- Inner splice tray -->
    <ellipse cx="32" cy="32" rx="14" ry="6" fill="none" stroke="#a78bfa" stroke-width="1.5" filter="url(#neon-glow-fsp)"/>
    <!-- Fiber strands entering left -->
    <line x1="2" y1="28" x2="18" y2="30" stroke="#c4b5fd" stroke-width="1.5" filter="url(#neon-glow-fsp)"/>
    <line x1="2" y1="32" x2="18" y2="32" stroke="#a78bfa" stroke-width="1.5" filter="url(#neon-glow-fsp)"/>
    <line x1="2" y1="36" x2="18" y2="34" stroke="#ddd6fe" stroke-width="1.5" filter="url(#neon-glow-fsp)"/>
    <!-- Fiber strands exiting right -->
    <line x1="46" y1="30" x2="62" y2="28" stroke="#c4b5fd" stroke-width="1.5" filter="url(#neon-glow-fsp)"/>
    <line x1="46" y1="32" x2="62" y2="32" stroke="#a78bfa" stroke-width="1.5" filter="url(#neon-glow-fsp)"/>
    <line x1="46" y1="34" x2="62" y2="36" stroke="#ddd6fe" stroke-width="1.5" filter="url(#neon-glow-fsp)"/>
    <!-- Splice points (fusion splices shown as bright dots) -->
    <circle cx="26" cy="31" r="2" fill="#e9d5ff" filter="url(#neon-glow-fsp)"/>
    <circle cx="32" cy="32" r="2" fill="#e9d5ff" filter="url(#neon-glow-fsp)"/>
    <circle cx="38" cy="33" r="2" fill="#e9d5ff" filter="url(#neon-glow-fsp)"/>
    <!-- Signal glow on active fibers -->
    <circle cx="8" cy="30" r="1" fill="#f0abfc" filter="url(#neon-glow-fsp)" opacity="0.8"/>
    <circle cx="56" cy="30" r="1" fill="#f0abfc" filter="url(#neon-glow-fsp)" opacity="0.8"/>
    <!-- Grounding lug -->
    <line x1="32" y1="42" x2="32" y2="50" stroke="#6b7280" stroke-width="1.5" filter="url(#neon-glow-fsp)"/>
    <line x1="28" y1="50" x2="36" y2="50" stroke="#6b7280" stroke-width="1" filter="url(#neon-glow-fsp)"/>
    <line x1="29" y1="52" x2="35" y2="52" stroke="#6b7280" stroke-width="1" filter="url(#neon-glow-fsp)"/>
    <line x1="30" y1="54" x2="34" y2="54" stroke="#6b7280" stroke-width="1" filter="url(#neon-glow-fsp)"/>
</svg>