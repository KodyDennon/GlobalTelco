<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-ixp" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Central Exchange Fabric (hexagonal hub) -->
    <polygon points="32,12 48,22 48,42 32,52 16,42 16,22" fill="none" stroke="#2563eb" stroke-width="2" filter="url(#neon-glow-ixp)"/>
    <polygon points="32,20 40,26 40,38 32,44 24,38 24,26" fill="none" stroke="#3b82f6" stroke-width="1.5" filter="url(#neon-glow-ixp)"/>
    <!-- Inner core -->
    <circle cx="32" cy="32" r="5" fill="#1d4ed8" fill-opacity="0.4" stroke="#60a5fa" stroke-width="2" filter="url(#neon-glow-ixp)"/>
    <circle cx="32" cy="32" r="2" fill="#93c5fd" filter="url(#neon-glow-ixp)"/>
    <!-- Peering connections radiating out (6 directions) -->
    <line x1="32" y1="12" x2="32" y2="4" stroke="#60a5fa" stroke-width="2" filter="url(#neon-glow-ixp)"/>
    <circle cx="32" cy="3" r="2.5" fill="#93c5fd" filter="url(#neon-glow-ixp)"/>
    <line x1="48" y1="22" x2="56" y2="16" stroke="#60a5fa" stroke-width="2" filter="url(#neon-glow-ixp)"/>
    <circle cx="57" cy="15" r="2.5" fill="#93c5fd" filter="url(#neon-glow-ixp)"/>
    <line x1="48" y1="42" x2="56" y2="48" stroke="#60a5fa" stroke-width="2" filter="url(#neon-glow-ixp)"/>
    <circle cx="57" cy="49" r="2.5" fill="#93c5fd" filter="url(#neon-glow-ixp)"/>
    <line x1="32" y1="52" x2="32" y2="60" stroke="#60a5fa" stroke-width="2" filter="url(#neon-glow-ixp)"/>
    <circle cx="32" cy="61" r="2.5" fill="#93c5fd" filter="url(#neon-glow-ixp)"/>
    <line x1="16" y1="42" x2="8" y2="48" stroke="#60a5fa" stroke-width="2" filter="url(#neon-glow-ixp)"/>
    <circle cx="7" cy="49" r="2.5" fill="#93c5fd" filter="url(#neon-glow-ixp)"/>
    <line x1="16" y1="22" x2="8" y2="16" stroke="#60a5fa" stroke-width="2" filter="url(#neon-glow-ixp)"/>
    <circle cx="7" cy="15" r="2.5" fill="#93c5fd" filter="url(#neon-glow-ixp)"/>
    <!-- Data flow pulses on spokes -->
    <circle cx="32" cy="8" r="1" fill="#dbeafe" filter="url(#neon-glow-ixp)"/>
    <circle cx="52" cy="19" r="1" fill="#dbeafe" filter="url(#neon-glow-ixp)"/>
    <circle cx="12" cy="45" r="1" fill="#dbeafe" filter="url(#neon-glow-ixp)"/>
</svg>