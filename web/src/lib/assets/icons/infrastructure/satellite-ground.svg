<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-sat" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Dish Base -->
    <path d="M 28 56 L 36 56 L 34 38 L 30 38 Z" fill="none" stroke="#fbbf24" stroke-width="2" filter="url(#neon-glow-sat)"/>
    <line x1="22" y1="56" x2="42" y2="56" stroke="#fbbf24" stroke-width="2" filter="url(#neon-glow-sat)"/>

    <!-- The Dish -->
    <path d="M 10 26 Q 32 46 54 26 Q 32 38 10 26 Z" fill="none" stroke="#fcd34d" stroke-width="2" filter="url(#neon-glow-sat)"/>
    <path d="M 10 26 Q 32 14 54 26" fill="none" stroke="#fcd34d" stroke-dasharray="2 4" stroke-width="1.5" filter="url(#neon-glow-sat)" opacity="0.6"/>

    <!-- Receiver arm -->
    <line x1="32" y1="38" x2="32" y2="18" stroke="#f59e0b" stroke-width="2" filter="url(#neon-glow-sat)"/>
    <circle cx="32" cy="16" r="3" fill="#fde68a" filter="url(#neon-glow-sat)"/>

    <!-- Uplink Signal Beams -->
    <path d="M 28 10 L 20 2" stroke="#fde68a" stroke-width="1.5" stroke-dasharray="2 3" fill="none" filter="url(#neon-glow-sat)"/>
    <path d="M 32 8 L 32 0" stroke="#fde68a" stroke-width="1.5" stroke-dasharray="2 3" fill="none" filter="url(#neon-glow-sat)"/>
    <path d="M 36 10 L 44 2" stroke="#fde68a" stroke-width="1.5" stroke-dasharray="2 3" fill="none" filter="url(#neon-glow-sat)"/>
</svg>
