<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-dwdm" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="dwdm-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#6d28d9" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#3b0764" stop-opacity="0.1"/>
        </linearGradient>
    </defs>
    <!-- Equipment Chassis -->
    <rect x="10" y="16" width="44" height="36" rx="4" fill="url(#dwdm-grad)" stroke="#7c3aed" stroke-width="2" filter="url(#neon-glow-dwdm)"/>
    <!-- Wavelength Channels (colored lines = multiplexed lambdas) -->
    <line x1="4" y1="26" x2="14" y2="26" stroke="#ef4444" stroke-width="2" filter="url(#neon-glow-dwdm)"/>
    <line x1="4" y1="30" x2="14" y2="30" stroke="#f59e0b" stroke-width="2" filter="url(#neon-glow-dwdm)"/>
    <line x1="4" y1="34" x2="14" y2="34" stroke="#22c55e" stroke-width="2" filter="url(#neon-glow-dwdm)"/>
    <line x1="4" y1="38" x2="14" y2="38" stroke="#3b82f6" stroke-width="2" filter="url(#neon-glow-dwdm)"/>
    <line x1="4" y1="42" x2="14" y2="42" stroke="#a855f7" stroke-width="2" filter="url(#neon-glow-dwdm)"/>
    <!-- Multiplexer prism (all wavelengths merge) -->
    <polygon points="18,24 30,34 18,44" fill="none" stroke="#c4b5fd" stroke-width="2" filter="url(#neon-glow-dwdm)"/>
    <!-- Single combined fiber output -->
    <line x1="30" y1="34" x2="54" y2="34" stroke="#e9d5ff" stroke-width="3" filter="url(#neon-glow-dwdm)"/>
    <line x1="54" y1="34" x2="62" y2="34" stroke="#e9d5ff" stroke-width="3" filter="url(#neon-glow-dwdm)"/>
    <!-- Rainbow shimmer on combined fiber -->
    <line x1="34" y1="32" x2="38" y2="32" stroke="#ef4444" stroke-width="0.8" filter="url(#neon-glow-dwdm)" opacity="0.6"/>
    <line x1="38" y1="33" x2="42" y2="33" stroke="#f59e0b" stroke-width="0.8" filter="url(#neon-glow-dwdm)" opacity="0.6"/>
    <line x1="42" y1="32" x2="46" y2="32" stroke="#22c55e" stroke-width="0.8" filter="url(#neon-glow-dwdm)" opacity="0.6"/>
    <line x1="46" y1="33" x2="50" y2="33" stroke="#3b82f6" stroke-width="0.8" filter="url(#neon-glow-dwdm)" opacity="0.6"/>
    <!-- Status Panel -->
    <rect x="34" y="22" width="16" height="6" rx="1" fill="none" stroke="#a78bfa" stroke-width="1" filter="url(#neon-glow-dwdm)"/>
    <circle cx="38" cy="25" r="1" fill="#34d399" filter="url(#neon-glow-dwdm)"/>
    <circle cx="42" cy="25" r="1" fill="#34d399" filter="url(#neon-glow-dwdm)"/>
    <circle cx="46" cy="25" r="1" fill="#34d399" filter="url(#neon-glow-dwdm)"/>
    <!-- Channel count label area -->
    <rect x="34" y="42" width="16" height="4" rx="1" fill="#6d28d9" fill-opacity="0.4" stroke="#a78bfa" stroke-width="0.5" filter="url(#neon-glow-dwdm)"/>
</svg>