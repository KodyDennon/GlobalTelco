<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-leos" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Satellite Body (compact flat-sat design) -->
    <rect x="24" y="26" width="16" height="12" rx="2" fill="none" stroke="#38bdf8" stroke-width="2" filter="url(#neon-glow-leos)"/>
    <!-- Solar Panel Arrays (large flat panels) -->
    <rect x="2" y="28" width="20" height="8" rx="1" fill="none" stroke="#fbbf24" stroke-width="1.5" filter="url(#neon-glow-leos)"/>
    <rect x="42" y="28" width="20" height="8" rx="1" fill="none" stroke="#fbbf24" stroke-width="1.5" filter="url(#neon-glow-leos)"/>
    <!-- Solar cell lines -->
    <line x1="8" y1="28" x2="8" y2="36" stroke="#f59e0b" stroke-width="0.5" filter="url(#neon-glow-leos)" opacity="0.5"/>
    <line x1="14" y1="28" x2="14" y2="36" stroke="#f59e0b" stroke-width="0.5" filter="url(#neon-glow-leos)" opacity="0.5"/>
    <line x1="48" y1="28" x2="48" y2="36" stroke="#f59e0b" stroke-width="0.5" filter="url(#neon-glow-leos)" opacity="0.5"/>
    <line x1="54" y1="28" x2="54" y2="36" stroke="#f59e0b" stroke-width="0.5" filter="url(#neon-glow-leos)" opacity="0.5"/>
    <!-- Antenna (phased array downlink) -->
    <rect x="28" y="38" width="8" height="3" rx="1" fill="none" stroke="#7dd3fc" stroke-width="1.5" filter="url(#neon-glow-leos)"/>
    <!-- Downlink beam -->
    <line x1="32" y1="41" x2="28" y2="56" stroke="#7dd3fc" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-leos)" opacity="0.6"/>
    <line x1="32" y1="41" x2="36" y2="56" stroke="#7dd3fc" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-leos)" opacity="0.6"/>
    <!-- ISL laser link ports -->
    <circle cx="24" cy="32" r="1.5" fill="#67e8f9" filter="url(#neon-glow-leos)"/>
    <circle cx="40" cy="32" r="1.5" fill="#67e8f9" filter="url(#neon-glow-leos)"/>
    <!-- Star tracker (top) -->
    <circle cx="32" cy="24" r="2" fill="#e0f2fe" filter="url(#neon-glow-leos)"/>
    <!-- Status indicator -->
    <circle cx="30" cy="30" r="1" fill="#34d399" filter="url(#neon-glow-leos)"/>
    <!-- Orbit speed indicator (motion lines) -->
    <line x1="4" y1="22" x2="12" y2="22" stroke="#38bdf8" stroke-width="1" filter="url(#neon-glow-leos)" opacity="0.3"/>
    <line x1="6" y1="42" x2="14" y2="42" stroke="#38bdf8" stroke-width="1" filter="url(#neon-glow-leos)" opacity="0.3"/>
</svg>