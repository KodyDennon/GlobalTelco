<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-me" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="me-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ea580c" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#7c2d12" stop-opacity="0.1"/>
        </linearGradient>
    </defs>
    <!-- Switchboard Cabinet -->
    <rect x="12" y="14" width="40" height="44" rx="3" fill="url(#me-grad)" stroke="#ea580c" stroke-width="2" filter="url(#neon-glow-me)"/>
    <!-- Patch panel rows (jack field) -->
    <line x1="18" y1="22" x2="46" y2="22" stroke="#fb923c" stroke-width="1.5" filter="url(#neon-glow-me)"/>
    <line x1="18" y1="28" x2="46" y2="28" stroke="#fb923c" stroke-width="1.5" filter="url(#neon-glow-me)"/>
    <line x1="18" y1="34" x2="46" y2="34" stroke="#fb923c" stroke-width="1.5" filter="url(#neon-glow-me)"/>
    <line x1="18" y1="40" x2="46" y2="40" stroke="#fb923c" stroke-width="1.5" filter="url(#neon-glow-me)"/>
    <!-- Jack holes (plugs) -->
    <circle cx="22" cy="22" r="1.5" fill="#fdba74" filter="url(#neon-glow-me)"/>
    <circle cx="30" cy="22" r="1.5" fill="#fdba74" filter="url(#neon-glow-me)"/>
    <circle cx="38" cy="22" r="1.5" fill="#fdba74" filter="url(#neon-glow-me)"/>
    <circle cx="26" cy="28" r="1.5" fill="#fdba74" filter="url(#neon-glow-me)"/>
    <circle cx="34" cy="28" r="1.5" fill="#fdba74" filter="url(#neon-glow-me)"/>
    <circle cx="42" cy="28" r="1.5" fill="#fdba74" filter="url(#neon-glow-me)"/>
    <circle cx="22" cy="34" r="1.5" fill="#fdba74" filter="url(#neon-glow-me)"/>
    <circle cx="30" cy="34" r="1.5" fill="#fdba74" filter="url(#neon-glow-me)"/>
    <circle cx="38" cy="34" r="1.5" fill="#fdba74" filter="url(#neon-glow-me)"/>
    <!-- Patch cords (two connections shown) -->
    <path d="M 22 22 C 22 26 26 26 26 28" fill="none" stroke="#fde68a" stroke-width="1.5" filter="url(#neon-glow-me)"/>
    <path d="M 38 28 C 38 32 22 32 22 34" fill="none" stroke="#fde68a" stroke-width="1.5" filter="url(#neon-glow-me)"/>
    <!-- Operator handset -->
    <path d="M 24 46 C 24 42 28 42 32 44 C 36 46 40 46 40 42" fill="none" stroke="#f97316" stroke-width="2" filter="url(#neon-glow-me)"/>
    <!-- Active call indicator -->
    <circle cx="32" cy="48" r="2" fill="#34d399" filter="url(#neon-glow-me)"/>
    <!-- Top label plate -->
    <rect x="22" y="16" width="20" height="3" rx="1" fill="none" stroke="#f97316" stroke-width="1" filter="url(#neon-glow-me)"/>
</svg>