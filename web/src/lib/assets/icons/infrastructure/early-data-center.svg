<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-edc" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="edc-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#4ade80" stop-opacity="0.2"/>
            <stop offset="100%" stop-color="#14532d" stop-opacity="0.1"/>
        </linearGradient>
    </defs>
    <!-- Mainframe Cabinet -->
    <rect x="10" y="18" width="20" height="38" rx="2" fill="url(#edc-grad)" stroke="#4ade80" stroke-width="2" filter="url(#neon-glow-edc)"/>
    <!-- Second Cabinet -->
    <rect x="34" y="18" width="20" height="38" rx="2" fill="url(#edc-grad)" stroke="#4ade80" stroke-width="2" filter="url(#neon-glow-edc)"/>
    <!-- Tape Drive Reels on left cabinet -->
    <circle cx="20" cy="28" r="5" fill="none" stroke="#86efac" stroke-width="1.5" filter="url(#neon-glow-edc)"/>
    <circle cx="20" cy="28" r="2" fill="#166534" stroke="#4ade80" stroke-width="1" filter="url(#neon-glow-edc)"/>
    <!-- Blinking lights panel on left -->
    <rect x="14" y="38" width="12" height="6" fill="none" stroke="#22c55e" stroke-width="1" filter="url(#neon-glow-edc)"/>
    <circle cx="16" cy="41" r="1" fill="#34d399" filter="url(#neon-glow-edc)"/>
    <circle cx="19" cy="41" r="1" fill="#f59e0b" filter="url(#neon-glow-edc)"/>
    <circle cx="22" cy="41" r="1" fill="#34d399" filter="url(#neon-glow-edc)"/>
    <circle cx="25" cy="41" r="1" fill="#34d399" filter="url(#neon-glow-edc)"/>
    <!-- Disk platters on right cabinet -->
    <circle cx="44" cy="30" r="6" fill="none" stroke="#86efac" stroke-width="1.5" filter="url(#neon-glow-edc)"/>
    <circle cx="44" cy="30" r="3" fill="none" stroke="#4ade80" stroke-width="1" filter="url(#neon-glow-edc)"/>
    <circle cx="44" cy="30" r="1" fill="#86efac" filter="url(#neon-glow-edc)"/>
    <!-- Right cabinet panels -->
    <rect x="38" y="42" width="12" height="4" fill="none" stroke="#22c55e" stroke-width="1" filter="url(#neon-glow-edc)"/>
    <rect x="38" y="48" width="12" height="4" fill="none" stroke="#22c55e" stroke-width="1" filter="url(#neon-glow-edc)"/>
    <!-- Cable connection between cabinets -->
    <path d="M 30 34 C 32 34 32 34 34 34" fill="none" stroke="#86efac" stroke-width="2" filter="url(#neon-glow-edc)"/>
    <!-- Cooling vents -->
    <line x1="14" y1="18" x2="14" y2="12" stroke="#86efac" stroke-width="1.5" filter="url(#neon-glow-edc)"/>
    <line x1="20" y1="18" x2="20" y2="14" stroke="#86efac" stroke-width="1.5" filter="url(#neon-glow-edc)"/>
    <line x1="44" y1="18" x2="44" y2="12" stroke="#86efac" stroke-width="1.5" filter="url(#neon-glow-edc)"/>
    <line x1="50" y1="18" x2="50" y2="14" stroke="#86efac" stroke-width="1.5" filter="url(#neon-glow-edc)"/>
</svg>