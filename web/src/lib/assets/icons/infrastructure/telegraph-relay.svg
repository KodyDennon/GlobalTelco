<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-tr" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Wooden Pole -->
    <rect x="29" y="14" width="6" height="44" fill="none" stroke="#92400e" stroke-width="2" filter="url(#neon-glow-tr)"/>
    <!-- Cross Arms -->
    <rect x="12" y="16" width="40" height="3" rx="1" fill="none" stroke="#b45309" stroke-width="2" filter="url(#neon-glow-tr)"/>
    <rect x="16" y="26" width="32" height="3" rx="1" fill="none" stroke="#b45309" stroke-width="1.5" filter="url(#neon-glow-tr)"/>
    <!-- Insulators on top arm -->
    <circle cx="16" cy="14" r="2" fill="#d97706" filter="url(#neon-glow-tr)"/>
    <circle cx="26" cy="14" r="2" fill="#d97706" filter="url(#neon-glow-tr)"/>
    <circle cx="38" cy="14" r="2" fill="#d97706" filter="url(#neon-glow-tr)"/>
    <circle cx="48" cy="14" r="2" fill="#d97706" filter="url(#neon-glow-tr)"/>
    <!-- Insulators on lower arm -->
    <circle cx="20" cy="24" r="2" fill="#d97706" filter="url(#neon-glow-tr)"/>
    <circle cx="44" cy="24" r="2" fill="#d97706" filter="url(#neon-glow-tr)"/>
    <!-- Wires stretching out -->
    <line x1="4" y1="14" x2="16" y2="14" stroke="#fbbf24" stroke-width="1" filter="url(#neon-glow-tr)"/>
    <line x1="48" y1="14" x2="60" y2="14" stroke="#fbbf24" stroke-width="1" filter="url(#neon-glow-tr)"/>
    <line x1="4" y1="24" x2="20" y2="24" stroke="#fbbf24" stroke-width="1" filter="url(#neon-glow-tr)"/>
    <line x1="44" y1="24" x2="60" y2="24" stroke="#fbbf24" stroke-width="1" filter="url(#neon-glow-tr)"/>
    <!-- Signal spark -->
    <circle cx="32" cy="10" r="2.5" fill="#fde68a" filter="url(#neon-glow-tr)"/>
    <!-- Ground base -->
    <line x1="22" y1="58" x2="42" y2="58" stroke="#92400e" stroke-width="2" filter="url(#neon-glow-tr)"/>
</svg>