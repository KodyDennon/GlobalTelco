<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-colo" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="colo-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#2563eb" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0.1"/>
        </linearGradient>
    </defs>
    <!-- Building Exterior -->
    <rect x="8" y="18" width="48" height="38" rx="3" fill="url(#colo-grad)" stroke="#2563eb" stroke-width="2" filter="url(#neon-glow-colo)"/>
    <!-- Server Cage Partitions (3 cages) -->
    <rect x="12" y="24" width="12" height="26" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="3 2" filter="url(#neon-glow-colo)"/>
    <rect x="26" y="24" width="12" height="26" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="3 2" filter="url(#neon-glow-colo)"/>
    <rect x="40" y="24" width="12" height="26" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="3 2" filter="url(#neon-glow-colo)"/>
    <!-- Rack units in each cage -->
    <rect x="14" y="26" width="8" height="4" rx="1" fill="none" stroke="#60a5fa" stroke-width="1" filter="url(#neon-glow-colo)"/>
    <rect x="14" y="32" width="8" height="4" rx="1" fill="none" stroke="#60a5fa" stroke-width="1" filter="url(#neon-glow-colo)"/>
    <rect x="14" y="38" width="8" height="4" rx="1" fill="none" stroke="#60a5fa" stroke-width="1" filter="url(#neon-glow-colo)"/>
    <rect x="28" y="26" width="8" height="4" rx="1" fill="none" stroke="#60a5fa" stroke-width="1" filter="url(#neon-glow-colo)"/>
    <rect x="28" y="32" width="8" height="4" rx="1" fill="none" stroke="#60a5fa" stroke-width="1" filter="url(#neon-glow-colo)"/>
    <rect x="42" y="26" width="8" height="4" rx="1" fill="none" stroke="#60a5fa" stroke-width="1" filter="url(#neon-glow-colo)"/>
    <rect x="42" y="32" width="8" height="4" rx="1" fill="none" stroke="#60a5fa" stroke-width="1" filter="url(#neon-glow-colo)"/>
    <rect x="42" y="38" width="8" height="4" rx="1" fill="none" stroke="#60a5fa" stroke-width="1" filter="url(#neon-glow-colo)"/>
    <!-- Status LEDs per cage -->
    <circle cx="15" cy="28" r="1" fill="#34d399" filter="url(#neon-glow-colo)"/>
    <circle cx="15" cy="34" r="1" fill="#34d399" filter="url(#neon-glow-colo)"/>
    <circle cx="29" cy="28" r="1" fill="#f59e0b" filter="url(#neon-glow-colo)"/>
    <circle cx="43" cy="28" r="1" fill="#34d399" filter="url(#neon-glow-colo)"/>
    <circle cx="43" cy="34" r="1" fill="#34d399" filter="url(#neon-glow-colo)"/>
    <!-- Cooling units on top -->
    <rect x="16" y="14" width="8" height="4" rx="1" fill="none" stroke="#93c5fd" stroke-width="1.5" filter="url(#neon-glow-colo)"/>
    <rect x="40" y="14" width="8" height="4" rx="1" fill="none" stroke="#93c5fd" stroke-width="1.5" filter="url(#neon-glow-colo)"/>
    <!-- Security badge reader -->
    <rect x="30" y="46" width="4" height="6" rx="1" fill="#2563eb" stroke="#60a5fa" stroke-width="0.5" filter="url(#neon-glow-colo)"/>
    <circle cx="32" cy="48" r="1" fill="#34d399" filter="url(#neon-glow-colo)"/>
</svg>