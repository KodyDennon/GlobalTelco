<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-mdr" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Drone Body (X-frame quadcopter) -->
    <rect x="26" y="26" width="12" height="12" rx="3" fill="none" stroke="#d946ef" stroke-width="2" filter="url(#neon-glow-mdr)"/>
    <!-- Arms extending to rotors -->
    <line x1="26" y1="26" x2="14" y2="14" stroke="#c026d3" stroke-width="2" filter="url(#neon-glow-mdr)"/>
    <line x1="38" y1="26" x2="50" y2="14" stroke="#c026d3" stroke-width="2" filter="url(#neon-glow-mdr)"/>
    <line x1="26" y1="38" x2="14" y2="50" stroke="#c026d3" stroke-width="2" filter="url(#neon-glow-mdr)"/>
    <line x1="38" y1="38" x2="50" y2="50" stroke="#c026d3" stroke-width="2" filter="url(#neon-glow-mdr)"/>
    <!-- Rotors (spinning circles) -->
    <circle cx="14" cy="14" r="6" fill="none" stroke="#e879f9" stroke-width="1.5" stroke-dasharray="3 3" filter="url(#neon-glow-mdr)"/>
    <circle cx="50" cy="14" r="6" fill="none" stroke="#e879f9" stroke-width="1.5" stroke-dasharray="3 3" filter="url(#neon-glow-mdr)"/>
    <circle cx="14" cy="50" r="6" fill="none" stroke="#e879f9" stroke-width="1.5" stroke-dasharray="3 3" filter="url(#neon-glow-mdr)"/>
    <circle cx="50" cy="50" r="6" fill="none" stroke="#e879f9" stroke-width="1.5" stroke-dasharray="3 3" filter="url(#neon-glow-mdr)"/>
    <!-- Rotor hubs -->
    <circle cx="14" cy="14" r="2" fill="#f0abfc" filter="url(#neon-glow-mdr)"/>
    <circle cx="50" cy="14" r="2" fill="#f0abfc" filter="url(#neon-glow-mdr)"/>
    <circle cx="14" cy="50" r="2" fill="#f0abfc" filter="url(#neon-glow-mdr)"/>
    <circle cx="50" cy="50" r="2" fill="#f0abfc" filter="url(#neon-glow-mdr)"/>
    <!-- Antenna payload (underneath body) -->
    <line x1="32" y1="38" x2="32" y2="46" stroke="#d946ef" stroke-width="1.5" filter="url(#neon-glow-mdr)"/>
    <circle cx="32" cy="48" r="2.5" fill="#e879f9" filter="url(#neon-glow-mdr)"/>
    <!-- Signal broadcast waves -->
    <path d="M 24 48 Q 32 56 40 48" fill="none" stroke="#f0abfc" stroke-width="1.5" filter="url(#neon-glow-mdr)" opacity="0.6"/>
    <path d="M 20 52 Q 32 62 44 52" fill="none" stroke="#f0abfc" stroke-width="1" filter="url(#neon-glow-mdr)" opacity="0.3"/>
    <!-- Mesh link indicators -->
    <line x1="8" y1="32" x2="2" y2="32" stroke="#d946ef" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-mdr)" opacity="0.5"/>
    <line x1="56" y1="32" x2="62" y2="32" stroke="#d946ef" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-mdr)" opacity="0.5"/>
    <!-- GPS/nav LED -->
    <circle cx="32" cy="26" r="1.5" fill="#34d399" filter="url(#neon-glow-mdr)"/>
</svg>