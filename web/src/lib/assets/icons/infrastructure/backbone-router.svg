<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-br" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="br-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#818cf8" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.1"/>
        </linearGradient>
    </defs>
    <!-- Router Body -->
    <rect x="10" y="22" width="44" height="24" rx="5" fill="url(#br-grad)" stroke="#818cf8" stroke-width="2" filter="url(#neon-glow-br)"/>
    <!-- Backbone Links (radiating lines) -->
    <line x1="32" y1="22" x2="32" y2="8" stroke="#a5b4fc" stroke-width="2" filter="url(#neon-glow-br)"/>
    <line x1="32" y1="46" x2="32" y2="58" stroke="#a5b4fc" stroke-width="2" filter="url(#neon-glow-br)"/>
    <line x1="10" y1="34" x2="2" y2="34" stroke="#a5b4fc" stroke-width="2" filter="url(#neon-glow-br)"/>
    <line x1="54" y1="34" x2="62" y2="34" stroke="#a5b4fc" stroke-width="2" filter="url(#neon-glow-br)"/>
    <!-- Connection dots at ends -->
    <circle cx="32" cy="6" r="3" fill="#818cf8" filter="url(#neon-glow-br)"/>
    <circle cx="32" cy="60" r="3" fill="#818cf8" filter="url(#neon-glow-br)"/>
    <circle cx="2" cy="34" r="3" fill="#818cf8" filter="url(#neon-glow-br)"/>
    <circle cx="62" cy="34" r="3" fill="#818cf8" filter="url(#neon-glow-br)"/>
    <!-- Inner routing indicator -->
    <circle cx="32" cy="34" r="6" fill="none" stroke="#c7d2fe" stroke-width="1.5" filter="url(#neon-glow-br)"/>
    <circle cx="32" cy="34" r="2" fill="#818cf8" filter="url(#neon-glow-br)"/>
    <!-- Port lights -->
    <circle cx="18" cy="30" r="1.5" fill="#34d399" filter="url(#neon-glow-br)"/>
    <circle cx="23" cy="30" r="1.5" fill="#34d399" filter="url(#neon-glow-br)"/>
    <circle cx="41" cy="30" r="1.5" fill="#34d399" filter="url(#neon-glow-br)"/>
    <circle cx="46" cy="30" r="1.5" fill="#34d399" filter="url(#neon-glow-br)"/>
</svg>
