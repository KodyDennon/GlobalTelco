<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-sub" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="water-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.5"/>
            <stop offset="100%" stop-color="#0369a1" stop-opacity="0.1"/>
        </linearGradient>
    </defs>
    <!-- Ocean Wave Pattern -->
    <path d="M 4 48 Q 12 42 20 48 T 36 48 T 52 48 T 60 48" fill="none" stroke="#38bdf8" stroke-width="1.5" filter="url(#neon-glow-sub)" opacity="0.6"/>
    <path d="M 4 56 Q 12 50 20 56 T 36 56 T 52 56 T 60 56" fill="none" stroke="#0284c7" stroke-width="1.5" filter="url(#neon-glow-sub)" opacity="0.4"/>

    <!-- Landing Station Building -->
    <rect x="22" y="24" width="20" height="20" rx="2" fill="none" stroke="#0ea5e9" stroke-width="2" filter="url(#neon-glow-sub)"/>
    <!-- Heavy Cable coming ashore -->
    <path d="M 32 44 C 32 54 44 54 58 60" fill="none" stroke="#7dd3fc" stroke-width="4" filter="url(#neon-glow-sub)"/>
    
    <!-- Data Pulse on Cable -->
    <circle cx="42" cy="51" r="2.5" fill="#bae6fd" filter="url(#neon-glow-sub)"/>

    <!-- Top Comm Link -->
    <line x1="32" y1="24" x2="32" y2="14" stroke="#7dd3fc" stroke-width="2" filter="url(#neon-glow-sub)"/>
    <circle cx="32" cy="12" r="3" fill="#e0f2fe" filter="url(#neon-glow-sub)"/>
    
    <!-- Pulse Rings -->
    <circle cx="32" cy="12" r="8" fill="none" stroke="#38bdf8" stroke-width="1" stroke-dasharray="2 2" filter="url(#neon-glow-sub)"/>
</svg>
