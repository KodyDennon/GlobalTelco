<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-tf" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="tf-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#0c4a6e" stop-opacity="0.1"/>
        </linearGradient>
    </defs>
    <!-- Factory Building (smaller than satellite factory) -->
    <rect x="10" y="30" width="44" height="24" rx="2" fill="url(#tf-grad)" stroke="#0ea5e9" stroke-width="2" filter="url(#neon-glow-tf)"/>
    <!-- Roof -->
    <path d="M 10 30 L 22 20 L 22 30 L 34 20 L 34 30 L 46 22 L 46 30 L 54 26 L 54 30" fill="none" stroke="#38bdf8" stroke-width="2" filter="url(#neon-glow-tf)"/>
    <!-- Terminal dish assembly line -->
    <!-- Terminal 1: frame -->
    <circle cx="18" cy="40" r="4" fill="none" stroke="#7dd3fc" stroke-width="1.5" filter="url(#neon-glow-tf)"/>
    <circle cx="18" cy="40" r="1.5" fill="#bae6fd" filter="url(#neon-glow-tf)"/>
    <!-- Terminal 2: in progress -->
    <circle cx="32" cy="40" r="4" fill="none" stroke="#38bdf8" stroke-width="1.5" filter="url(#neon-glow-tf)"/>
    <path d="M 30 40 Q 32 36 34 40" fill="none" stroke="#38bdf8" stroke-width="1" filter="url(#neon-glow-tf)"/>
    <!-- Terminal 3: completed -->
    <circle cx="46" cy="40" r="4" fill="none" stroke="#0ea5e9" stroke-width="1.5" filter="url(#neon-glow-tf)"/>
    <path d="M 44 40 Q 46 36 48 40" fill="none" stroke="#7dd3fc" stroke-width="1.5" filter="url(#neon-glow-tf)"/>
    <circle cx="46" cy="38" r="1" fill="#bae6fd" filter="url(#neon-glow-tf)"/>
    <!-- Conveyor belt -->
    <line x1="14" y1="46" x2="50" y2="46" stroke="#0284c7" stroke-width="1.5" filter="url(#neon-glow-tf)"/>
    <path d="M 46 44 L 50 46 L 46 48" fill="none" stroke="#0284c7" stroke-width="1.5" filter="url(#neon-glow-tf)"/>
    <!-- Box output (packaged terminals) -->
    <rect x="48" y="46" width="6" height="6" rx="1" fill="none" stroke="#38bdf8" stroke-width="1" filter="url(#neon-glow-tf)"/>
    <!-- Status LEDs -->
    <circle cx="14" cy="50" r="1" fill="#34d399" filter="url(#neon-glow-tf)"/>
    <circle cx="18" cy="50" r="1" fill="#34d399" filter="url(#neon-glow-tf)"/>
    <!-- Loading dock -->
    <rect x="4" y="42" width="6" height="8" fill="none" stroke="#0ea5e9" stroke-width="1.5" filter="url(#neon-glow-tf)"/>
</svg>