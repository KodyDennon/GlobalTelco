<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-microwave" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Endpoints (Mini Dishes) -->
    <path d="M 12 24 Q 16 32 12 40" fill="none" stroke="#2dd4bf" stroke-width="2" filter="url(#neon-glow-microwave)"/>
    <path d="M 52 24 Q 48 32 52 40" fill="none" stroke="#2dd4bf" stroke-width="2" filter="url(#neon-glow-microwave)"/>
    <circle cx="16" cy="32" r="2" fill="#99f6e4" filter="url(#neon-glow-microwave)"/>
    <circle cx="48" cy="32" r="2" fill="#99f6e4" filter="url(#neon-glow-microwave)"/>

    <!-- Microwave Beams -->
    <path d="M 20 32 L 44 32" stroke="#5eead4" stroke-width="2" stroke-dasharray="6 4" filter="url(#neon-glow-microwave)"/>
    <path d="M 24 24 L 40 24" stroke="#5eead4" stroke-width="1.5" stroke-dasharray="2 4" filter="url(#neon-glow-microwave)" opacity="0.6"/>
    <path d="M 24 40 L 40 40" stroke="#5eead4" stroke-width="1.5" stroke-dasharray="2 4" filter="url(#neon-glow-microwave)" opacity="0.6"/>
</svg>
