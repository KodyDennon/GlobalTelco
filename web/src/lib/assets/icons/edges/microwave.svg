<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="currentColor">
  <!-- Left dish -->
  <path d="M6 18c0-8 4-14 8-14v28c-4 0-8-6-8-14z" opacity="0.7"/>
  <path d="M14 4v28" fill="none" stroke="currentColor" stroke-width="2"/>
  <circle cx="12" cy="18" r="2"/>
  <circle cx="12" cy="18" r="1" opacity="0.5" fill="#fff"/>
  <!-- Left tower -->
  <rect x="12" y="32" width="4" height="24" rx="0.5" opacity="0.5"/>
  <rect x="8" y="54" width="12" height="4" rx="1" opacity="0.4"/>
  <!-- Right dish -->
  <path d="M58 18c0-8-4-14-8-14v28c4 0 8-6 8-14z" opacity="0.7"/>
  <path d="M50 4v28" fill="none" stroke="currentColor" stroke-width="2"/>
  <circle cx="52" cy="18" r="2"/>
  <circle cx="52" cy="18" r="1" opacity="0.5" fill="#fff"/>
  <!-- Right tower -->
  <rect x="48" y="32" width="4" height="24" rx="0.5" opacity="0.5"/>
  <rect x="44" y="54" width="12" height="4" rx="1" opacity="0.4"/>
  <!-- Microwave beam -->
  <line x1="14" y1="18" x2="50" y2="18" stroke="currentColor" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <!-- Beam propagation waves -->
  <ellipse cx="24" cy="18" rx="2" ry="6" fill="none" stroke="currentColor" stroke-width="1" opacity="0.25"/>
  <ellipse cx="32" cy="18" rx="2" ry="8" fill="none" stroke="currentColor" stroke-width="1" opacity="0.2"/>
  <ellipse cx="40" cy="18" rx="2" ry="6" fill="none" stroke="currentColor" stroke-width="1" opacity="0.25"/>
  <!-- Ground line -->
  <line x1="4" y1="58" x2="60" y2="58" stroke="currentColor" stroke-width="1" opacity="0.2"/>
</svg>
