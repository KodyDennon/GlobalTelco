<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-copper" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="grad-copper" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#b45309" />
            <stop offset="50%" stop-color="#f59e0b" />
            <stop offset="100%" stop-color="#b45309" />
        </linearGradient>
    </defs>

    <!-- Thick Copper Wire -->
    <path d="M 8 32 L 56 32" stroke="url(#grad-copper)" stroke-width="6" filter="url(#neon-glow-copper)"/>
    
    <!-- Sheathing breaks -->
    <line x1="20" y1="28" x2="20" y2="36" stroke="#fbbf24" stroke-width="2" filter="url(#neon-glow-copper)"/>
    <line x1="44" y1="28" x2="44" y2="36" stroke="#fbbf24" stroke-width="2" filter="url(#neon-glow-copper)"/>

    <!-- Subtle Data Pulse -->
    <path d="M 8 32 L 20 28 L 32 36 L 44 28 L 56 32" fill="none" stroke="#fcd34d" stroke-width="1.5" filter="url(#neon-glow-copper)" opacity="0.8"/>
</svg>
