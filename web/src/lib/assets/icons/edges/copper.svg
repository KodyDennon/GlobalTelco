<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="currentColor">
  <!-- Outer insulation -->
  <rect x="6" y="24" width="52" height="16" rx="8" opacity="0.2"/>
  <rect x="6" y="24" width="52" height="16" rx="8" fill="none" stroke="currentColor" stroke-width="1.5"/>
  <!-- Twisted pair 1 -->
  <path d="M10 30c3-3 6-3 9 0s6 3 9 0 6-3 9 0 6 3 9 0" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.8"/>
  <!-- Twisted pair 2 -->
  <path d="M10 34c3 3 6 3 9 0s6-3 9 0 6 3 9 0 6-3 9 0" fill="none" stroke="currentColor" stroke-width="2.5" opacity="0.8"/>
  <!-- Shielding foil hints -->
  <line x1="10" y1="26" x2="54" y2="26" stroke="currentColor" stroke-width="0.5" opacity="0.3" stroke-dasharray="3 2"/>
  <line x1="10" y1="38" x2="54" y2="38" stroke="currentColor" stroke-width="0.5" opacity="0.3" stroke-dasharray="3 2"/>
  <!-- Connector left - RJ-style -->
  <rect x="1" y="26" width="7" height="12" rx="1"/>
  <rect x="2" y="28" width="2" height="2" rx="0.5" opacity="0.5" fill="#fff"/>
  <rect x="2" y="32" width="2" height="2" rx="0.5" opacity="0.5" fill="#fff"/>
  <!-- Connector right -->
  <rect x="56" y="26" width="7" height="12" rx="1"/>
  <rect x="60" y="28" width="2" height="2" rx="0.5" opacity="0.5" fill="#fff"/>
  <rect x="60" y="32" width="2" height="2" rx="0.5" opacity="0.5" fill="#fff"/>
  <!-- Label -->
  <text x="32" y="52" text-anchor="middle" font-size="7" font-family="monospace" opacity="0.4" fill="currentColor">COPPER</text>
</svg>
