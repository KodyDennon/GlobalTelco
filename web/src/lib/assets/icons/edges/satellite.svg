<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="currentColor">
  <!-- Satellite body -->
  <rect x="24" y="8" width="16" height="12" rx="2"/>
  <!-- Solar panel left -->
  <rect x="4" y="9" width="18" height="10" rx="1" opacity="0.6"/>
  <line x1="8" y1="9" x2="8" y2="19" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
  <line x1="12" y1="9" x2="12" y2="19" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
  <line x1="16" y1="9" x2="16" y2="19" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
  <line x1="4" y1="14" x2="22" y2="14" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
  <!-- Solar panel right -->
  <rect x="42" y="9" width="18" height="10" rx="1" opacity="0.6"/>
  <line x1="46" y1="9" x2="46" y2="19" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
  <line x1="50" y1="9" x2="50" y2="19" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
  <line x1="54" y1="9" x2="54" y2="19" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
  <line x1="42" y1="14" x2="60" y2="14" stroke="currentColor" stroke-width="0.5" opacity="0.3"/>
  <!-- Antenna dish on satellite -->
  <circle cx="32" cy="22" r="3"/>
  <circle cx="32" cy="22" r="1.5" opacity="0.4" fill="#fff"/>
  <!-- Satellite detail -->
  <rect x="28" y="10" width="2" height="2" rx="0.5" opacity="0.4" fill="#fff"/>
  <rect x="34" y="10" width="2" height="2" rx="0.5" opacity="0.4" fill="#fff"/>
  <!-- Downlink beam -->
  <path d="M29 25l-10 28" stroke="currentColor" stroke-width="1.5" opacity="0.35"/>
  <path d="M35 25l10 28" stroke="currentColor" stroke-width="1.5" opacity="0.35"/>
  <path d="M32 25v30" stroke="currentColor" stroke-width="1" opacity="0.2" stroke-dasharray="3 3"/>
  <!-- Ground footprint -->
  <ellipse cx="32" cy="56" rx="18" ry="4" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.3"/>
  <ellipse cx="32" cy="56" rx="12" ry="2.5" fill="none" stroke="currentColor" stroke-width="1" opacity="0.2"/>
  <!-- Ground station indicator -->
  <circle cx="32" cy="56" r="2" opacity="0.6"/>
</svg>
