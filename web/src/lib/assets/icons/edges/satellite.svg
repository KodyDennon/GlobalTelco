<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-satedge" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    
    <!-- Orbit Arc -->
    <path d="M 8 40 Q 32 -10 56 40" fill="none" stroke="#fcd34d" stroke-width="2" stroke-dasharray="4 6" filter="url(#neon-glow-satedge)"/>
    
    <!-- Central Satellite -->
    <rect x="28" y="10" width="8" height="8" rx="1" fill="#f59e0b" filter="url(#neon-glow-satedge)"/>
    <rect x="18" y="12" width="8" height="4" fill="none" stroke="#fef08a" stroke-width="1.5" filter="url(#neon-glow-satedge)"/>
    <rect x="38" y="12" width="8" height="4" fill="none" stroke="#fef08a" stroke-width="1.5" filter="url(#neon-glow-satedge)"/>
    
    <!-- Ground Beams -->
    <path d="M 12 40 L 28 14" stroke="#fde68a" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-satedge)" opacity="0.8"/>
    <path d="M 52 40 L 36 14" stroke="#fde68a" stroke-width="1.5" stroke-dasharray="2 2" filter="url(#neon-glow-satedge)" opacity="0.8"/>
    
    <!-- Ground Terminals -->
    <circle cx="12" cy="40" r="3" fill="#fef08a" filter="url(#neon-glow-satedge)"/>
    <circle cx="52" cy="40" r="3" fill="#fef08a" filter="url(#neon-glow-satedge)"/>
</svg>
