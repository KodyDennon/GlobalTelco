<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-fiber" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <!-- Main Fiber Line -->
    <path d="M 8 32 Q 24 16 32 32 T 56 32" fill="none" stroke="#60a5fa" stroke-width="4" filter="url(#neon-glow-fiber)"/>
    
    <!-- Inner Light Pulse -->
    <path d="M 8 32 Q 24 16 32 32 T 56 32" fill="none" stroke="#bfdbfe" stroke-width="1.5" filter="url(#neon-glow-fiber)" stroke-dasharray="12 12"/>
    
    <!-- Outer Dispersion Ring at endpoints -->
    <circle cx="8" cy="32" r="4" fill="none" stroke="#2563eb" stroke-width="2" filter="url(#neon-glow-fiber)"/>
    <circle cx="56" cy="32" r="4" fill="none" stroke="#2563eb" stroke-width="2" filter="url(#neon-glow-fiber)"/>
    
    <!-- Core Connection Points -->
    <circle cx="8" cy="32" r="2" fill="#eff6ff" filter="url(#neon-glow-fiber)"/>
    <circle cx="56" cy="32" r="2" fill="#eff6ff" filter="url(#neon-glow-fiber)"/>
</svg>
