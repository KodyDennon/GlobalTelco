<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="currentColor">
  <!-- Outer cable jacket -->
  <path d="M4 26h56v12H4z" rx="6" opacity="0.3"/>
  <rect x="4" y="26" width="56" height="12" rx="6" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Individual fiber strands -->
  <line x1="8" y1="30" x2="56" y2="30" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
  <line x1="8" y1="32" x2="56" y2="32" stroke="currentColor" stroke-width="2"/>
  <line x1="8" y1="34" x2="56" y2="34" stroke="currentColor" stroke-width="1.5" opacity="0.7"/>
  <!-- Light pulses traveling through fibers -->
  <circle cx="18" cy="30" r="2" opacity="0.9"/>
  <circle cx="16" cy="30" r="3" opacity="0.3"/>
  <circle cx="38" cy="32" r="2" opacity="0.9"/>
  <circle cx="36" cy="32" r="3" opacity="0.3"/>
  <circle cx="50" cy="34" r="2" opacity="0.9"/>
  <circle cx="48" cy="34" r="3" opacity="0.3"/>
  <!-- Connector end left -->
  <rect x="1" y="24" width="5" height="16" rx="1.5"/>
  <rect x="2" y="27" width="3" height="2" rx="0.5" opacity="0.4" fill="#fff"/>
  <rect x="2" y="31" width="3" height="2" rx="0.5" opacity="0.4" fill="#fff"/>
  <rect x="2" y="35" width="3" height="2" rx="0.5" opacity="0.4" fill="#fff"/>
  <!-- Connector end right -->
  <rect x="58" y="24" width="5" height="16" rx="1.5"/>
  <rect x="59" y="27" width="3" height="2" rx="0.5" opacity="0.4" fill="#fff"/>
  <rect x="59" y="31" width="3" height="2" rx="0.5" opacity="0.4" fill="#fff"/>
  <rect x="59" y="35" width="3" height="2" rx="0.5" opacity="0.4" fill="#fff"/>
  <!-- Light pulse trail -->
  <circle cx="28" cy="32" r="4" opacity="0.15"/>
  <circle cx="44" cy="30" r="3" opacity="0.1"/>
</svg>
