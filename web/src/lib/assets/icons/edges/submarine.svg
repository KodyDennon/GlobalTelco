<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
    <defs>
        <filter id="neon-glow-subedge" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <linearGradient id="deep-water" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#0284c7" stop-opacity="0.8" />
            <stop offset="100%" stop-color="#082f49" stop-opacity="0.2" />
        </linearGradient>
    </defs>

    <!-- Water Surface -->
    <path d="M 4 20 Q 18 14 32 20 T 60 20" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="4 4" filter="url(#neon-glow-subedge)" opacity="0.6"/>
    
    <!-- Submarine Cable Deep Arc -->
    <path d="M 8 32 C 8 56 56 56 56 32" fill="none" stroke="#0ea5e9" stroke-width="4" filter="url(#neon-glow-subedge)"/>
    
    <!-- Protected Armoring Layers -->
    <path d="M 8 32 C 8 56 56 56 56 32" fill="none" stroke="#baebfd" stroke-width="1.5" stroke-dasharray="10 6" filter="url(#neon-glow-subedge)"/>
    
    <!-- Pulse -->
    <circle cx="32" cy="47" r="3" fill="#e0f2fe" filter="url(#neon-glow-subedge)"/>
    
    <!-- Repeaters -->
    <rect x="20" y="42" width="4" height="6" fill="#7dd3fc" filter="url(#neon-glow-subedge)"/>
    <rect x="40" y="42" width="4" height="6" fill="#7dd3fc" filter="url(#neon-glow-subedge)"/>
</svg>
