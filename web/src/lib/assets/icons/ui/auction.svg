<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="currentColor">
  <!-- Gavel head -->
  <rect x="12" y="12" width="28" height="12" rx="3" transform="rotate(-30 26 18)" opacity="0.7"/>
  <!-- Gavel handle -->
  <rect x="34" y="26" width="6" height="28" rx="2" transform="rotate(-30 37 40)"/>
  <!-- Strike block -->
  <rect x="8" y="50" width="26" height="8" rx="2" opacity="0.5"/>
  <!-- Impact lines -->
  <line x1="18" y1="46" x2="14" y2="42" stroke="currentColor" stroke-width="2" opacity="0.3"/>
  <line x1="22" y1="44" x2="22" y2="39" stroke="currentColor" stroke-width="2" opacity="0.25"/>
  <line x1="26" y1="46" x2="30" y2="42" stroke="currentColor" stroke-width="2" opacity="0.3"/>
  <!-- Dollar sign -->
  <text x="50" y="20" font-size="16" font-weight="700" fill="currentColor" opacity="0.4" font-family="sans-serif">$</text>
</svg>
