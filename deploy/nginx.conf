# GlobalTelco — Nginx reverse proxy with origin SSL (Let's Encrypt)
# Optional: only needed if bypassing Cloudflare proxy (DNS-only / gray cloud).
# Default setup uses nginx-pre-ssl.conf (HTTP-only) since Cloudflare terminates TLS.
# Proxies HTTPS/WSS → http://127.0.0.1:3001 (Rust game server)

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name server.globaltelco.online;

    # Let's Encrypt ACME challenge (certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check available over HTTP (for monitoring)
    location = /health {
        proxy_pass http://127.0.0.1:3001;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name server.globaltelco.online;

    # SSL certificates (Let's Encrypt / certbot)
    ssl_certificate /etc/letsencrypt/live/server.globaltelco.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/server.globaltelco.online/privkey.pem;

    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # WebSocket endpoint
    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # REST API + health check
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
