app = 'globaltelco'
primary_region = 'iad'

[build]

[env]
  GT_HOST = '0.0.0.0'
  GT_PORT = '3001'
  RUST_LOG = 'gt_server=info,tower_http=info'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[http_service.checks]]
  grace_period = '10s'
  interval = '30s'
  method = 'GET'
  path = '/health'
  timeout = '5s'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
