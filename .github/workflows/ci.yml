name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            desktop/src-tauri -> target

      - name: Install Linux dependencies (for desktop check)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Run tests first (debug mode) to catch issues early
      - name: Run tests
        run: cargo test

      # Build release artifacts
      - name: Build workspace (release)
        run: cargo build --release

      - name: Build server with postgres
        run: cargo build --release --bin gt-server --features postgres

      - name: Check desktop app compiles
        run: cd desktop && cargo check

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM module
        run: wasm-pack build crates/gt-wasm --target web --out-dir ../../web/src/lib/wasm/pkg

      - uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        run: cd web && bun install

      - name: Type-check frontend
        run: cd web && bun run check

      - name: Build frontend
        run: cd web && bun run build
