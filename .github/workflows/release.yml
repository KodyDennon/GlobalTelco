name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'engine-v*'
      - 'server-v*'
      - 'web-v*'
      - 'admin-v*'
      # desktop-v* is handled by desktop-release.yml (tauri-action creates the release)

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract component and version from tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          COMPONENT="${TAG%%-v*}"
          VERSION="${TAG#*-v}"
          # Human-readable display names
          case "$COMPONENT" in
            engine) DISPLAY="Simulation Engine" ;;
            server) DISPLAY="Multiplayer Server" ;;
            web)    DISPLAY="Web Client" ;;
            admin)  DISPLAY="Admin Panel" ;;
            *)      DISPLAY="$COMPONENT" ;;
          esac
          echo "component=${COMPONENT}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "display=${DISPLAY}" >> "$GITHUB_OUTPUT"
          echo "Component: ${DISPLAY}, Version: ${VERSION}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ steps.meta.outputs.display }} v${{ steps.meta.outputs.version }}"
          draft: false
          generate_release_notes: true
          body: |
            ## GlobalTelco — ${{ steps.meta.outputs.display }} v${{ steps.meta.outputs.version }}

            **Component:** ${{ steps.meta.outputs.display }}
            **Tag:** `${{ github.ref_name }}`

            See the auto-generated changelog below for details.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
