name: Desktop Release

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-15
            target: aarch64-apple-darwin
            name: macOS ARM
          - platform: macos-15
            target: x86_64-apple-darwin
            name: macOS Intel
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            desktop/src-tauri -> target

      - uses: oven-sh/setup-bun@v2

      # Linux dependencies for Tauri
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Install wasm-pack (use pre-built binary on unix, cargo install on windows)
      - name: Install wasm-pack (unix)
        if: matrix.platform != 'windows-latest'
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install wasm-pack (windows)
        if: matrix.platform == 'windows-latest'
        run: cargo install wasm-pack

      # Build WASM module
      - name: Build WASM
        run: wasm-pack build crates/gt-wasm --target web --out-dir ../../web/src/lib/wasm/pkg

      # Install frontend dependencies
      - name: Install frontend dependencies
        run: cd web && bun install

      # Build Tauri app
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'GlobalTelco Desktop ${{ github.ref_name }}'
          releaseBody: |
            ## GlobalTelco — Desktop App

            Native desktop application with full offline single-player support.
            The simulation runs natively in Rust for maximum performance.

            ### Downloads
            | Platform | File |
            |----------|------|
            | **Windows** | `.msi` installer |
            | **macOS (Apple Silicon)** | `.dmg` (aarch64) |
            | **macOS (Intel)** | `.dmg` (x86_64) |
            | **Linux** | `.deb` / `.AppImage` |
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
