name: Desktop Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS ARM
          - platform: macos-13
            target: x86_64-apple-darwin
            name: macOS Intel
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.name }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - uses: oven-sh/setup-bun@v2

      # Linux dependencies for Tauri
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Build WASM module
      - name: Build WASM
        run: |
          cargo install wasm-pack
          wasm-pack build crates/gt-wasm --target web --out-dir ../../web/src/lib/wasm/pkg

      # Install frontend dependencies
      - name: Install frontend dependencies
        run: cd web && bun install

      # Build Tauri app
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_name }}
          releaseName: 'GlobalTelco ${{ github.ref_name }}'
          releaseBody: 'Desktop release for GlobalTelco'
          releaseDraft: true
          prerelease: false

  web-deploy:
    runs-on: ubuntu-latest
    name: Deploy Web
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2
      - run: cargo install wasm-pack
      - run: wasm-pack build crates/gt-wasm --target web --out-dir ../../web/src/lib/wasm/pkg
      - run: cd web && bun install && bun run build
