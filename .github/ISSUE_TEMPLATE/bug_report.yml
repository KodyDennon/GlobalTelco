name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Map / Rendering
        - Build UX
        - Simulation / ECS
        - Network Dashboard
        - Multiplayer
        - Desktop (Tauri)
        - Other
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Game Mode
      options:
        - Single-player (Browser)
        - Multiplayer
        - Desktop App
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, any relevant details
      placeholder: "Chrome 120, macOS 14, 1920x1080"
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots
